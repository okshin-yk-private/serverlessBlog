[projects."/home/okshin/src/github.com/okshin-yk-private/serverlessBlog"]
trust_level = "trusted"


# BEGIN AI-MCP
[mcp_servers."aws-knowledge-mcp-server"]
command = "npx"
args = ["mcp-remote", "https://knowledge-mcp.global.api.aws"]

[mcp_servers."aws-mcp"]
command = "uvx"
args = ["mcp-proxy-for-aws@latest", "https://aws-mcp.us-east-1.api.aws/mcp", "--metadata", "AWS_REGION=us-west-2"]

[mcp_servers."awslabs_cdk-mcp-server"]
command = "uvx"
args = ["awslabs.cdk-mcp-server@latest"]
[mcp_servers."awslabs_cdk-mcp-server".env]
FASTMCP_LOG_LEVEL = "ERROR"

[mcp_servers."awslabs_terraform-mcp-server"]
command = "uvx"
args = ["awslabs.terraform-mcp-server@latest"]
disabled = false
[mcp_servers."awslabs_terraform-mcp-server".env]
FASTMCP_LOG_LEVEL = "ERROR"

[mcp_servers."playwright"]
command = "npx"
args = ["@playwright/mcp@latest"]

[mcp_servers."sequential-thinking"]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]
# END AI-MCP
