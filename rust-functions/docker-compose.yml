version: '3.8'

services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: rust-dynamodb-local
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    networks:
      - rust-test-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  localstack:
    image: localstack/localstack:latest
    container_name: rust-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,cognito-idp
      - DEBUG=0
      - DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    volumes:
      - "./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh"
    networks:
      - rust-test-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep -q '\"s3\": \"running\"'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

networks:
  rust-test-network:
    driver: bridge
