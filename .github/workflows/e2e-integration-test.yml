name: E2E Integration Tests (AWS Environment)

# 手動実行のみ（AWS環境デプロイ完了後）
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'AWS Environment to test against'
        required: true
        type: choice
        options:
          - dev
          - prod
        default: 'dev'
      cleanup:
        description: 'Clean up test data after execution'
        required: true
        type: boolean
        default: true

permissions:
  id-token: write   # OIDC認証に必要
  contents: read
  issues: write      # テスト結果をIssueにコメント（オプション）

jobs:
  # AWS環境デプロイ状態確認
  check-deployment:
    name: Check AWS Deployment Status
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    outputs:
      api-endpoint: ${{ steps.get-outputs.outputs.api-endpoint }}
      cloudfront-url: ${{ steps.get-outputs.outputs.cloudfront-url }}
      public-site-url: ${{ steps.get-outputs.outputs.public-site-url }}
      admin-site-url: ${{ steps.get-outputs.outputs.admin-site-url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'ap-northeast-1' }}

      - name: Get CloudFormation Stack Outputs
        id: get-outputs
        run: |
          # APIエンドポイント取得
          API_ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name BlogAppApiStack-${{ github.event.inputs.environment }} \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiEndpoint`].OutputValue' \
            --output text)

          # CloudFront URL取得
          CLOUDFRONT_URL=$(aws cloudformation describe-stacks \
            --stack-name BlogAppCdnStack-${{ github.event.inputs.environment }} \
            --query 'Stacks[0].Outputs[?OutputKey==`CloudFrontUrl`].OutputValue' \
            --output text)

          # 公開サイトURL取得
          PUBLIC_SITE_URL=$(aws cloudformation describe-stacks \
            --stack-name BlogAppStorageStack-${{ github.event.inputs.environment }} \
            --query 'Stacks[0].Outputs[?OutputKey==`PublicSiteUrl`].OutputValue' \
            --output text)

          # 管理画面URL取得
          ADMIN_SITE_URL=$(aws cloudformation describe-stacks \
            --stack-name BlogAppStorageStack-${{ github.event.inputs.environment }} \
            --query 'Stacks[0].Outputs[?OutputKey==`AdminSiteUrl`].OutputValue' \
            --output text)

          # デプロイ状態確認
          if [ -z "$API_ENDPOINT" ] || [ -z "$CLOUDFRONT_URL" ] || \
             [ -z "$PUBLIC_SITE_URL" ] || [ -z "$ADMIN_SITE_URL" ]; then
            echo "❌ AWS環境が正しくデプロイされていません"
            echo "API_ENDPOINT: ${API_ENDPOINT:-未設定}"
            echo "CLOUDFRONT_URL: ${CLOUDFRONT_URL:-未設定}"
            echo "PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-未設定}"
            echo "ADMIN_SITE_URL: ${ADMIN_SITE_URL:-未設定}"
            exit 1
          fi

          echo "api-endpoint=$API_ENDPOINT" >> $GITHUB_OUTPUT
          echo "cloudfront-url=$CLOUDFRONT_URL" >> $GITHUB_OUTPUT
          echo "public-site-url=$PUBLIC_SITE_URL" >> $GITHUB_OUTPUT
          echo "admin-site-url=$ADMIN_SITE_URL" >> $GITHUB_OUTPUT

          echo "✅ AWS環境デプロイ確認完了"
          echo "API Endpoint: $API_ENDPOINT"
          echo "CloudFront URL: $CLOUDFRONT_URL"
          echo "Public Site URL: $PUBLIC_SITE_URL"
          echo "Admin Site URL: $ADMIN_SITE_URL"

  # 公開サイトE2Eテスト
  e2e-public-site:
    name: E2E Tests - Public Site
    runs-on: ubuntu-latest
    needs: check-deployment
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Run Public Site E2E Tests
        env:
          BASE_URL: ${{ needs.check-deployment.outputs.public-site-url }}
          API_ENDPOINT: ${{ needs.check-deployment.outputs.api-endpoint }}
          TEST_ENVIRONMENT: ${{ github.event.inputs.environment }}
          # MSWモックを無効化（実AWS環境に対してテスト）
          VITE_ENABLE_MSW_MOCK: 'false'
        run: |
          # 公開サイトE2Eテスト実行（Chromiumのみ）
          npx playwright test --config=playwright.config.ts --project=chromium tests/e2e/specs/home.spec.ts tests/e2e/specs/article.spec.ts
        continue-on-error: false

      - name: Upload Public Site E2E Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-public-results-${{ github.event.inputs.environment }}
          path: |
            playwright-report/
            test-results/
          retention-days: 30

      - name: Upload Public Site E2E Videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-public-videos-${{ github.event.inputs.environment }}
          path: test-results/**/*.webm
          retention-days: 7

  # 管理画面E2Eテスト
  e2e-admin-site:
    name: E2E Tests - Admin Site
    runs-on: ubuntu-latest
    needs: check-deployment
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Run Admin Site E2E Tests
        env:
          BASE_URL: ${{ needs.check-deployment.outputs.admin-site-url }}
          API_ENDPOINT: ${{ needs.check-deployment.outputs.api-endpoint }}
          COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
          TEST_ENVIRONMENT: ${{ github.event.inputs.environment }}
          # テスト用管理者アカウント認証情報
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
          # MSWモックを無効化（実AWS環境に対してテスト）
          VITE_ENABLE_MSW_MOCK: 'false'
        run: |
          # 管理画面E2Eテスト実行（Chromiumのみ）
          npx playwright test --config=playwright.admin.config.ts --project=chromium \
            tests/e2e/specs/admin-auth.spec.ts \
            tests/e2e/specs/admin-crud.spec.ts \
            tests/e2e/specs/admin-unauthorized-access.spec.ts
        continue-on-error: false

      - name: Upload Admin Site E2E Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-admin-results-${{ github.event.inputs.environment }}
          path: |
            playwright-report/
            test-results/
          retention-days: 30

      - name: Upload Admin Site E2E Videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-admin-videos-${{ github.event.inputs.environment }}
          path: test-results/**/*.webm
          retention-days: 7

  # テストデータクリーンアップ
  cleanup-test-data:
    name: Clean Up Test Data
    runs-on: ubuntu-latest
    needs: [e2e-public-site, e2e-admin-site]
    if: always() && github.event.inputs.cleanup == 'true'
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'ap-northeast-1' }}

      - name: Install dependencies
        run: npm ci

      - name: Clean up DynamoDB test data
        env:
          TABLE_NAME: BlogPosts-${{ github.event.inputs.environment }}
          AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-1' }}
        run: |
          # E2Eテストで作成されたテストデータを削除
          node scripts/cleanup-test-data.js

      - name: Clean up S3 test images
        env:
          BUCKET_NAME: blog-images-${{ github.event.inputs.environment }}
          AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-1' }}
        run: |
          # E2Eテストで作成されたテスト画像を削除
          aws s3 rm s3://$BUCKET_NAME/test-data/ --recursive

      - name: Report cleanup status
        run: |
          echo "✅ テストデータのクリーンアップが完了しました"

  # E2Eテスト結果サマリー
  e2e-test-summary:
    name: E2E Test Results Summary
    runs-on: ubuntu-latest
    needs: [e2e-public-site, e2e-admin-site, cleanup-test-data]
    if: always()

    steps:
      - name: Download All E2E Test Results
        uses: actions/download-artifact@v4
        with:
          path: e2e-results/

      - name: Generate E2E Test Summary
        run: |
          echo "# E2E統合テスト結果 (${{ github.event.inputs.environment }}環境)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## テスト実行結果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # 各ジョブの結果を表示
          echo "| テストスイート | 結果 |" >> $GITHUB_STEP_SUMMARY
          echo "|--------------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 公開サイトE2Eテスト | ${{ needs.e2e-public-site.result == 'success' && '✅ 成功' || '❌ 失敗' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 管理画面E2Eテスト | ${{ needs.e2e-admin-site.result == 'success' && '✅ 成功' || '❌ 失敗' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| テストデータクリーンアップ | ${{ needs.cleanup-test-data.result == 'success' && '✅ 成功' || needs.cleanup-test-data.result == 'skipped' && '⏭️ スキップ' || '❌ 失敗' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # 総合結果
          if [ "${{ needs.e2e-public-site.result }}" == "success" ] && \
             [ "${{ needs.e2e-admin-site.result }}" == "success" ]; then
            echo "## ✅ 総合結果: すべてのE2Eテストが成功しました" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### テスト詳細" >> $GITHUB_STEP_SUMMARY
            echo "- 公開サイト: 記事一覧表示、記事詳細閲覧" >> $GITHUB_STEP_SUMMARY
            echo "- 管理画面: ログイン/ログアウト、記事CRUD統合フロー、未認証アクセス" >> $GITHUB_STEP_SUMMARY
            exit 0
          else
            echo "## ❌ 総合結果: 一部のE2Eテストが失敗しました" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ テスト失敗の詳細はアーティファクトを確認してください。" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Report E2E Test Results
        if: failure()
        run: |
          echo "⚠️ E2E統合テストが失敗しました。"
          echo "Playwrightレポートとビデオ録画を確認してください。"
