# Repository-wide vulnerability scanning workflow.
#
# Scope: secrets (gitleaks), SAST (CodeQL), filesystem vulns/secrets/IaC/license (Trivy fs).
# Checkov for Terraform stays in ci.yml (label-conditional) and uploads its own SARIF.
#
# Phase 1 stance: visibility-first. Scanners exit cleanly so the workflow never blocks;
# all findings show up in GitHub Security → Code scanning. The hard-fail roadmap is
# tracked in docs/SECURITY_SCANNING.md.

name: Security Scan

on:
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.kiro/**'
  push:
    branches: [main, develop]
  schedule:
    # Mon 03:00 JST (Sun 18:00 UTC) — catches CVEs disclosed against unchanged code
    - cron: '0 18 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # =======================================
  # Job: gitleaks - secret scanning across full git history
  # We use the gitleaks CLI directly (not gitleaks-action) because
  # gitleaks-action requires a paid license for organization repos.
  # The CLI is OSS (MIT) and produces the same SARIF output.
  # =======================================
  gitleaks:
    name: Gitleaks (secrets)
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: '8.24.3'
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install gitleaks CLI
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks
        # Phase 1 stance: --exit-code 0 keeps the step green even when leaks are
        # detected. Findings still land in the SARIF and surface in the Security
        # tab. In Phase 3 flip back to --exit-code 1 to enforce.
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --report-format sarif \
            --report-path gitleaks.sarif \
            --redact \
            --verbose \
            --exit-code 0

      - name: Upload gitleaks SARIF to Code Scanning
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@7fc6561ed893d15cec696e062df840b21db27eb0 # v4.35.2
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

      - name: Upload gitleaks SARIF as artifact
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif
          retention-days: 30

  # =======================================
  # Job: CodeQL - SAST for Go and JavaScript/TypeScript
  # build-mode: none — modern CodeQL extracts source without requiring a
  # working compile step. This avoids the brittleness of autobuild (which
  # mis-handles Bun-managed JS/TS projects and multiple Go main packages).
  # =======================================
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            build-mode: none
          - language: javascript-typescript
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # CodeQL Go with build-mode: none still needs the Go toolchain installed
      # so the extractor can resolve go.mod imports.
      - name: Setup Go
        if: matrix.language == 'go'
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: '1.25.5'
          check-latest: true
          cache-dependency-path: go-functions/go.sum

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7fc6561ed893d15cec696e062df840b21db27eb0 # v4.35.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7fc6561ed893d15cec696e062df840b21db27eb0 # v4.35.2
        with:
          category: /language:${{ matrix.language }}

  # =======================================
  # Job: Trivy filesystem scan (vulns + secrets + IaC + license)
  # We install the Trivy CLI via aquasecurity/setup-trivy and run it directly,
  # avoiding trivy-action wrapper input ambiguity (e.g., trivyignores vs
  # ignore-files renames between releases).
  # =======================================
  trivy-fs:
    name: Trivy (filesystem)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Trivy CLI
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6
        with:
          version: v0.58.1

      - name: Verify Trivy install
        run: trivy --version

      - name: Run Trivy filesystem scan
        # Phase 1 stance: --exit-code 0 keeps the step green even when findings
        # exist. Findings still land in the SARIF and surface in the Security tab.
        # Start with the minimum set of scanners (vuln + secret) to keep the
        # initial DB pull fast and reliable; misconfig + license can be enabled
        # in a follow-up PR once the baseline is stable.
        run: |
          set -x
          trivy fs \
            --severity HIGH,CRITICAL \
            --format sarif \
            --output trivy-fs.sarif \
            --ignore-unfixed \
            --exit-code 0 \
            --no-progress \
            .

      - name: Upload Trivy SARIF to Code Scanning
        if: always() && hashFiles('trivy-fs.sarif') != ''
        uses: github/codeql-action/upload-sarif@7fc6561ed893d15cec696e062df840b21db27eb0 # v4.35.2
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Upload Trivy SARIF as artifact
        if: always() && hashFiles('trivy-fs.sarif') != ''
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: trivy-fs-sarif
          path: trivy-fs.sarif
          retention-days: 30

  # =======================================
  # Job: Summary (always runs, never blocks)
  # =======================================
  security-scan-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [gitleaks, codeql, trivy-fs]
    if: always()
    steps:
      - name: Render summary
        run: |
          {
            echo "# Security Scan Summary"
            echo ""
            echo "| Scanner | Result |"
            echo "|---------|--------|"
            echo "| Gitleaks (secrets) | ${{ needs.gitleaks.result }} |"
            echo "| CodeQL | ${{ needs.codeql.result }} |"
            echo "| Trivy (fs) | ${{ needs.trivy-fs.result }} |"
            echo ""
            echo "Findings appear in **Security → Code scanning** under the categories: \`gitleaks\`, \`/language:go\`, \`/language:javascript-typescript\`, \`trivy-fs\`."
            echo ""
            echo "Phase 1 stance is visibility-first; see \`docs/SECURITY_SCANNING.md\` for the hard-fail roadmap."
          } >> "$GITHUB_STEP_SUMMARY"
