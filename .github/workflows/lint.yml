name: Lint

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint:
    name: ESLint & Prettier Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend/admin
        run: npm ci

      - name: Install infrastructure dependencies
        working-directory: infrastructure
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npm run format:check

      - name: Lint frontend
        working-directory: frontend/admin
        run: npm run lint

      - name: Lint infrastructure
        working-directory: infrastructure
        run: npm run lint || echo "Infrastructure linting may have issues - continuing..."

  lint-summary:
    name: Lint Summary
    runs-on: ubuntu-latest
    needs: lint
    if: always()

    steps:
      - name: Check lint status
        run: |
          if [ "${{ needs.lint.result }}" == "failure" ]; then
            echo "❌ Lint checks failed. Please fix the linting errors."
            exit 1
          else
            echo "✅ All lint checks passed!"
          fi
