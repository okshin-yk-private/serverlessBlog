# Full E2E Test Workflow (All Browsers)
# 全ブラウザでのクロスブラウザテスト
# 手動実行（workflow_dispatch）でのみトリガー
#
# Requirements:
# - R43: Playwright E2Eテスト
# - クロスブラウザ対応検証

name: E2E Tests (Full - All Browsers)

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - public
          - admin

jobs:
  # =======================================
  # Job 1: Full E2E Tests (All Browsers)
  # =======================================
  e2e-full-tests:
    name: E2E Tests (All Browsers)
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit, mobile-chrome, tablet]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install frontend (public) dependencies
        run: |
          cd frontend/public
          npm ci

      - name: Install frontend (admin) dependencies
        run: |
          cd frontend/admin
          npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      # Public Site E2E Tests
      - name: Run E2E tests (Public Site) - ${{ matrix.browser }}
        if: ${{ github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'public' }}
        run: npm run test:e2e -- --project=${{ matrix.browser }}
        env:
          CI: true

      # Admin Site E2E Tests (Chromium only for admin)
      - name: Run E2E tests (Admin Site) - Chromium
        if: ${{ (github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'admin') && matrix.browser == 'chromium' }}
        run: npm run test:e2e:admin -- --project=chromium
        env:
          CI: true

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7

  # =======================================
  # Job 2: Summary Report
  # =======================================
  e2e-summary:
    name: E2E Test Summary
    runs-on: ubuntu-latest
    needs: e2e-full-tests
    if: always()

    steps:
      - name: Summary
        run: |
          echo "========================================="
          echo "Full E2E Tests Completed"
          echo "========================================="
          echo ""
          echo "Test Type: ${{ github.event.inputs.test_type }}"
          echo "All browser results uploaded as artifacts"
          echo ""
          echo "========================================="
