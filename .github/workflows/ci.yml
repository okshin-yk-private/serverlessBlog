  # =======================================
  # Job 6: E2E Tests - Public Site (always runs if frontend tests passed)
  # =======================================
  e2e-public-tests:
    name: E2E Tests (Public Site)
    runs-on: ubuntu-latest
    needs: [frontend-public-tests]
    if: |
      !cancelled() &&
      (needs.frontend-public-tests.result == 'success')

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install frontend (public) dependencies
        working-directory: frontend/public
        run: bun install --frozen-lockfile

      - name: Get Playwright version
        id: playwright-version
        run: |
          PLAYWRIGHT_VERSION=$(node -e "console.log(require('./package.json').devDependencies['@playwright/test'])")
          echo "version=$PLAYWRIGHT_VERSION" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers and dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright system dependencies only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: |
          # Disable Microsoft package repositories that may cause 403 errors
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list || true
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list || true
          bunx playwright install-deps chromium

      - name: Run E2E tests (Public Site) - Chromium only
        run: bun run test:e2e -- --project=chromium --workers=1
        env:
          CI: true

      - name: Upload Playwright Report (Public)
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with:
          name: playwright-report-public
          path: playwright-report/
          retention-days: 30

  # =======================================
