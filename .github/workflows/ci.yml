        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install frontend (admin) dependencies
        working-directory: frontend/admin
        run: bun install --frozen-lockfile

      - name: Get Playwright version
        id: playwright-version
        run: |
          PLAYWRIGHT_VERSION=$(node -e "console.log(require('./package.json').devDependencies['@playwright/test'])")
          echo "version=$PLAYWRIGHT_VERSION" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers and dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright system dependencies only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: |
          # Disable Microsoft package repositories that may cause 403 errors
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list || true
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list || true
          bunx playwright install-deps chromium

      - name: Run E2E tests (Admin - Auth & Security) - Chromium only
        run: bun run test:e2e:admin -- tests/e2e/specs/admin-auth.spec.ts tests/e2e/specs/admin-unauthorized-access.spec.ts --project=chromium --workers=1
        env:
          CI: true

      - name: Upload Playwright Report (Admin)
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with:
          name: playwright-report-admin
          path: playwright-report-admin/
          retention-days: 30

  # =======================================
  # Job 7: Coverage Summary and Enforcement (runs when any test ran)
  # Note: backend-unit-tests removed (Task 21.3) - Node.js Lambda deleted
  # Note: infrastructure-tests removed - CDK to Terraform migration completed
  # =======================================
  coverage-check:
    name: Coverage Summary & Enforcement
    runs-on: ubuntu-latest
    needs:
      - go-tests
      - frontend-public-tests
      - frontend-admin-tests
    if: |
      !cancelled() &&
      (needs.go-tests.result == 'success' ||
       needs.frontend-public-tests.result == 'success' ||
       needs.frontend-admin-tests.result == 'success')

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download Go coverage
        if: needs.go-tests.result == 'success'
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: go-coverage
          path: coverage-go/

      - name: Download frontend (public) coverage
        if: needs.frontend-public-tests.result == 'success'
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: frontend-public-coverage
          path: coverage-frontend-public/

      - name: Download frontend (admin) coverage
        if: needs.frontend-admin-tests.result == 'success'
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: frontend-admin-coverage
          path: coverage-frontend-admin/

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Reorganize coverage files
        run: |
          mkdir -p go-functions frontend/public/coverage frontend/admin/coverage
          cp -r coverage-go/* go-functions/ || true
          cp -r coverage-frontend-public/* frontend/public/coverage/ || true
          cp -r coverage-frontend-admin/* frontend/admin/coverage/ || true

      - name: Generate coverage badges
        run: bun run coverage:badges

      - name: Upload coverage badges
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: coverage-badges
          path: docs/badges/
          retention-days: 90

      - name: Verify 100% Coverage Requirement
        run: |
          echo "========================================="
          echo "Coverage Summary"
          echo "========================================="

          # Function to check coverage from lcov-report/index.html
          check_coverage() {
            local component=$1
            local coverage_path=$2

            echo ""
            echo "--- $component ---"

            if [ -f "$coverage_path/lcov-report/index.html" ]; then
              # Extract coverage percentages from HTML report
              echo "✓ Coverage report exists for $component"

              # Check if coverage.json exists (if using json reporter)
              if [ -f "$coverage_path/coverage-final.json" ]; then
                echo "✓ Coverage data available"
              fi
            else
              echo "⊘ Coverage report not available for $component (skipped)"
            fi
          }

          check_coverage "Go Lambda" "coverage-go"
          check_coverage "Frontend (Public)" "coverage-frontend-public"
          check_coverage "Frontend (Admin)" "coverage-frontend-admin"

          echo ""
          echo "========================================="
          echo "Coverage checks completed!"
          echo "========================================="
          echo ""
          echo "Note: Individual test jobs enforce 100% coverage"
          echo "via jest.config.cjs coverageThreshold settings."
          echo "If any test job passed, it means 100% coverage"
          echo "was achieved for that component."

  # =======================================
  # Job: Final CI Success Check
  # =======================================
  ci-success:
    name: All CI Checks Passed
    runs-on: ubuntu-latest
    needs:
      - setup-labels
      - lint
      # Go Backend
      - go-lint
      - go-tests
      # Terraform Infrastructure
      - terraform-fmt
      - terraform-build-lambdas
      - terraform-merge-artifacts
      - terraform-validate-dev
      - terraform-validate-prd
      - terraform-security-scan
      - terraform-test
      - terraform-plan-dev
      - terraform-plan-prd
      # Frontend
      - frontend-public-tests
      - frontend-admin-tests
      - e2e-public-tests
      - e2e-admin-tests
      - coverage-check
    if: always()

    steps:
      - name: Check job results
        run: |
          echo "========================================="
          echo "CI Results Summary"
          echo "========================================="
          echo ""
          echo "Labels detected:"
          echo "  terraform: ${{ needs.setup-labels.outputs.has-terraform }}"
          echo "  go: ${{ needs.setup-labels.outputs.has-go }}"
          echo "  frontend: ${{ needs.setup-labels.outputs.has-frontend }}"
          echo "  infrastructure: ${{ needs.setup-labels.outputs.has-infrastructure }}"
          echo ""
          echo "--- Lint ---"
          echo "  ESLint & Prettier: ${{ needs.lint.result }}"
          echo ""
          echo "--- Go Backend ---"
          echo "  Go Lint: ${{ needs.go-lint.result }}"
          echo "  Go Tests: ${{ needs.go-tests.result }}"
          echo ""
          echo "--- Terraform Infrastructure ---"
          echo "  Format: ${{ needs.terraform-fmt.result }}"
          echo "  Build Lambdas: ${{ needs.terraform-build-lambdas.result }}"
          echo "  Merge Artifacts: ${{ needs.terraform-merge-artifacts.result }}"
          echo "  Validate (DEV): ${{ needs.terraform-validate-dev.result }}"
          echo "  Validate (PRD): ${{ needs.terraform-validate-prd.result }}"
          echo "  Security Scan: ${{ needs.terraform-security-scan.result }}"
          echo "  Test: ${{ needs.terraform-test.result }}"
          echo "  Plan (DEV): ${{ needs.terraform-plan-dev.result }}"
          echo "  Plan (PRD): ${{ needs.terraform-plan-prd.result }}"
          echo ""
          echo "--- Frontend ---"
          echo "  Public Tests: ${{ needs.frontend-public-tests.result }}"
          echo "  Admin Tests: ${{ needs.frontend-admin-tests.result }}"
          echo "  E2E Public: ${{ needs.e2e-public-tests.result }}"
          echo "  E2E Admin: ${{ needs.e2e-admin-tests.result }}"
          echo "  Coverage: ${{ needs.coverage-check.result }}"
          echo ""
          echo "========================================="

      - name: Verify required checks
        run: |
          # Lint is always required
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "❌ Lint check failed or was cancelled"
            exit 1
          fi

          # Check if any job failed (excluding skipped jobs)
          FAILED=false

          # Go Backend failures
          if [ "${{ needs.go-lint.result }}" == "failure" ] || \
             [ "${{ needs.go-tests.result }}" == "failure" ]; then
            echo "❌ Go Backend checks failed"
            FAILED=true
          fi

          # Terraform failures
          if [ "${{ needs.terraform-fmt.result }}" == "failure" ] || \
             [ "${{ needs.terraform-build-lambdas.result }}" == "failure" ] || \
             [ "${{ needs.terraform-validate-dev.result }}" == "failure" ] || \
             [ "${{ needs.terraform-validate-prd.result }}" == "failure" ] || \
             [ "${{ needs.terraform-test.result }}" == "failure" ] || \
             [ "${{ needs.terraform-plan-dev.result }}" == "failure" ] || \
             [ "${{ needs.terraform-plan-prd.result }}" == "failure" ]; then
            echo "❌ Terraform checks failed"
            FAILED=true
          fi

          # Frontend failures
          if [ "${{ needs.frontend-public-tests.result }}" == "failure" ] || \
             [ "${{ needs.frontend-admin-tests.result }}" == "failure" ] || \
             [ "${{ needs.e2e-public-tests.result }}" == "failure" ] || \
             [ "${{ needs.e2e-admin-tests.result }}" == "failure" ] || \
             [ "${{ needs.coverage-check.result }}" == "failure" ]; then
            echo "❌ Frontend checks failed"
            FAILED=true
          fi

          if [ "$FAILED" = true ]; then
            echo ""
            echo "❌ One or more CI checks failed"
            exit 1
          fi

          echo "========================================="
          echo "✓ All CI Checks Passed Successfully!"
          echo "========================================="
