        run: |
          terraform plan -out=tfplan.binary -detailed-exitcode -no-color 2>&1 | tee tfplan_output.txt || exitcode=$?
          terraform show -json tfplan.binary > tfplan.json
          terraform show -no-color tfplan.binary > tfplan.txt
          echo "exitcode=${exitcode:-0}" >> $GITHUB_OUTPUT

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: terraform-plan-prd
          path: |
            terraform/environments/prd/tfplan.binary
            terraform/environments/prd/tfplan.json
            terraform/environments/prd/tfplan.txt
          retention-days: 7

      - name: Comment Plan on PR
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const fs = require('fs');
            const planPath = 'terraform/environments/prd/tfplan.txt';
            let plan = fs.existsSync(planPath) ? fs.readFileSync(planPath, 'utf8') : 'Plan not available';
            if (plan.length > 60000) {
              plan = plan.substring(0, 60000) + '\n\n... (truncated)';
            }
            const summaryMatch = plan.match(/Plan: (\d+) to add, (\d+) to change, (\d+) to destroy/);
            const summary = summaryMatch
              ? `**${summaryMatch[1]}** to add, **${summaryMatch[2]}** to change, **${summaryMatch[3]}** to destroy`
              : plan.includes('No changes') ? '✅ No changes' : 'Summary not available';

            const output = `## 🚨 Terraform Plan (PRD) - PRODUCTION\n\n### Summary\n${summary}\n\n> ⚠️ **This plan affects PRODUCTION infrastructure!**\n\n<details>\n<summary>Show Plan Details</summary>\n\n\`\`\`hcl\n${plan}\n\`\`\`\n\n</details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  # =======================================
