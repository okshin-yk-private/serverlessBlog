# Unified CI Workflow with Label-based Conditional Execution
# Requirement R31: GitHub Actions CI/CD
# Requirement R45: 継続的テスト
# Requirement R39: TDD手法、100%テストカバレッジ
#
# This workflow combines comprehensive testing with efficient label-based execution
# Covers: Infrastructure (Terraform/CDK), Backend (Go Lambda), Frontend (React)
#
# Label-based execution:
# - 'terraform' label: Terraform fmt, validate, plan, security-scan
# - 'go' label: Go lint, tests, Lambda builds
# - 'frontend' label: Frontend tests, E2E tests
# - 'infrastructure' label: CDK tests, diff (legacy)

name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches:
      - main
      - develop

permissions:
  contents: read
  pull-requests: write # Required for actions/labeler to add labels
  id-token: write # Required for AWS OIDC authentication

env:
  GO_VERSION: '1.25.5'
  TERRAFORM_VERSION: '1.14.0'
  AWS_REGION: 'ap-northeast-1'

jobs:
  # =======================================
  # Job 0: Setup Labels (Auto-label + Check)
  # =======================================
  setup-labels:
    name: Auto-label and Get Labels
    runs-on: ubuntu-latest
    outputs:
      pr-number: ${{ steps.get-pr.outputs.pr-number }}
      has-infrastructure: ${{ steps.check-labels.outputs.has-infrastructure }}
      has-terraform: ${{ steps.check-labels.outputs.has-terraform }}
      has-frontend: ${{ steps.check-labels.outputs.has-frontend }}
      has-tests: ${{ steps.check-labels.outputs.has-tests }}
      has-workflow: ${{ steps.check-labels.outputs.has-workflow }}
      has-go: ${{ steps.check-labels.outputs.has-go }}
    steps:
      - name: Get PR number
        id: get-pr
        run: echo "pr-number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT

      - name: Label PR based on changed files
        if: |
          github.event.action == 'opened' ||
          github.event.action == 'synchronize' ||
          github.event.action == 'reopened'
        uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

      - name: Check labels
        id: check-labels
        run: |
          PR_NUMBER="${{ steps.get-pr.outputs.pr-number }}"

          # PRのラベルを取得
          LABELS=$(gh api /repos/${{ github.repository }}/pulls/$PR_NUMBER --jq '.labels[].name' | tr '\n' ',' || echo "")

          echo "PR Labels: $LABELS"

          # 各ラベルの存在をチェック
          if echo "$LABELS" | grep -q "infrastructure"; then
            echo "has-infrastructure=true" >> $GITHUB_OUTPUT
          else
            echo "has-infrastructure=false" >> $GITHUB_OUTPUT
          fi

          if echo "$LABELS" | grep -q "terraform"; then
            echo "has-terraform=true" >> $GITHUB_OUTPUT
          else
            echo "has-terraform=false" >> $GITHUB_OUTPUT
          fi

          if echo "$LABELS" | grep -q "frontend"; then
            echo "has-frontend=true" >> $GITHUB_OUTPUT
          else
            echo "has-frontend=false" >> $GITHUB_OUTPUT
          fi

          if echo "$LABELS" | grep -q "tests"; then
            echo "has-tests=true" >> $GITHUB_OUTPUT
          else
            echo "has-tests=false" >> $GITHUB_OUTPUT
          fi

          if echo "$LABELS" | grep -q "workflow"; then
            echo "has-workflow=true" >> $GITHUB_OUTPUT
          else
            echo "has-workflow=false" >> $GITHUB_OUTPUT
          fi

          # Note: Rust label check removed - Rust implementation has been deleted (Task 21.2)

          if echo "$LABELS" | grep -q "go"; then
            echo "has-go=true" >> $GITHUB_OUTPUT
          else
            echo "has-go=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # =======================================
  # Job 1: Lint Check (always runs)
  # =======================================
  lint:
    needs: [setup-labels]
    name: ESLint & Prettier Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: latest

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install frontend dependencies
        working-directory: frontend/admin
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint

      - name: Run Prettier check
        run: bun run format:check

      - name: Lint frontend
        working-directory: frontend/admin
        run: bun run lint

      - name: Security audit (public-site)
        run: npm audit --production --audit-level=high
        working-directory: frontend/public
        continue-on-error: true

      - name: Security audit (admin-dashboard)
        run: npm audit --production --audit-level=high
        working-directory: frontend/admin
        continue-on-error: true

  # =======================================
  # Job 2: Backend Unit Tests - REMOVED (Task 21.3)
  # Node.js implementation (functions/) has been deleted.
  # All Lambda functions are now implemented in Go.
  # See go-tests job for Go Lambda function tests.
  # =======================================

  # =======================================
  # Job 2.5a/b: Rust Lint and Tests - REMOVED (Task 21.2)
  # Rust implementation (rust-functions/) has been deleted.
  # All Lambda functions are now implemented in Go.
  # =======================================

  # =======================================
  # Job 2.6a: Go Lint (golangci-lint) - conditional on 'go' label
  # Requirement 6.1: go-lintジョブ - goラベル付きPRでgolangci-lint実行
  # Requirement 6.6: Go Lint失敗時のPRマージブロック
  # =======================================
  go-lint:
    needs: [setup-labels]
    name: Go Lint (golangci-lint)
    runs-on: ubuntu-latest
    if: needs.setup-labels.outputs.has-go == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache-dependency-path: go-functions/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: v2.7
          working-directory: go-functions
          args: --timeout=5m

      - name: Go vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        working-directory: go-functions
        continue-on-error: true

  # =======================================
  # Job 2.6b: Go Tests - Coverage (conditional on 'go' label)
  # Runs tests WITHOUT -race for fast coverage collection
  # Requirement 6.2: go-testsジョブ - go test -coverprofile実行
  # Requirement 6.3: 100%カバレッジ未満での失敗設定
  # =======================================
  go-tests-coverage:
    needs: [setup-labels]
    name: Go Tests (Coverage)
    runs-on: ubuntu-latest
    if: needs.setup-labels.outputs.has-go == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache-dependency-path: go-functions/go.sum

      - name: Run Go tests with coverage
        working-directory: go-functions
        run: |
          echo "========================================="
          echo "Go Environment Info"
          echo "========================================="
          go version
          go env GOVERSION
          echo ""
          echo "Running Go tests with coverage (no race detector)..."
          # Exclude benchmark package as it has no statements to cover
          # (benchmarks only contain test code, causing coverage profile issues in Go 1.25)
          # See: https://github.com/golang/go/issues/70244
          go list ./... | grep -v '/tests/benchmark$' | xargs go test -p 4 -coverprofile=coverage.out -covermode=atomic -v
          echo ""
          echo "Verifying coverage file..."
          if [ -f coverage.out ]; then
            echo "✓ coverage.out created successfully"
            ls -la coverage.out
          else
            echo "❌ coverage.out was not created"
            echo "Listing directory contents:"
            ls -la
            exit 1
          fi
        env:
          CI: true

      - name: Check coverage threshold (90% required)
        working-directory: go-functions
        run: |
          echo "========================================="
          echo "Go Coverage Report"
          echo "========================================="

          # Generate coverage report
          go tool cover -func=coverage.out

          # Extract total coverage percentage
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')

          echo ""
          echo "Total Coverage: ${COVERAGE}%"
          echo ""

          # Check if coverage is at least 90%
          # Using bc for floating point comparison
          if [ "$(echo "$COVERAGE < 90" | bc -l)" -eq 1 ]; then
            echo "❌ Coverage is below 90%: ${COVERAGE}%"
            echo "Go coverage threshold: 90% (main() functions excluded from practical coverage)"
            exit 1
          else
            echo "✓ Coverage meets 90% requirement: ${COVERAGE}%"
          fi

      - name: Upload Go coverage report
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with:
          name: go-coverage
          path: go-functions/coverage.out
          retention-days: 30

  # =======================================
  # Job 2.6c: Go Tests - Race Detection (conditional on 'go' label)
  # Runs tests WITH -race but WITHOUT coverage for focused race detection
  # Requirement 6.2: go-testsジョブ - go test -race実行
  # Requirement 6.6: Go Tests失敗時のPRマージブロック
  # =======================================
  go-tests-race:
    needs: [setup-labels]
    name: Go Tests (Race Detection)
    runs-on: ubuntu-latest
    if: needs.setup-labels.outputs.has-go == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache-dependency-path: go-functions/go.sum

      - name: Run Go tests with race detector
        working-directory: go-functions
        run: |
          echo "========================================="
          echo "Go Environment Info"
          echo "========================================="
          go version
          go env GOVERSION
          echo ""
          echo "Running Go tests with race detector (no coverage)..."
          # Exclude benchmark package (same as coverage job)
          # Use -p 2 (matching vCPU count) since -race increases memory usage 5-10x
          go list ./... | grep -v '/tests/benchmark$' | xargs go test -race -p 2 -v
        env:
          CI: true

  # =======================================
  # Job 2.6d: Go Tests Gate (conditional on 'go' label)
  # Aggregates go-tests-coverage and go-tests-race results
  # Keeps 'go-tests' name for downstream compatibility (coverage-check, ci-success)
  # Requirement 6.6: Go Tests失敗時のPRマージブロック
  # =======================================
  go-tests:
    needs: [setup-labels, go-tests-coverage, go-tests-race]
    name: Go Unit Tests
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.setup-labels.outputs.has-go == 'true'

    steps:
      - name: Verify both jobs passed
        run: |
          echo "========================================="
          echo "Go Tests Gate"
          echo "========================================="
          echo ""
          echo "Coverage job: ${{ needs.go-tests-coverage.result }}"
          echo "Race detection job: ${{ needs.go-tests-race.result }}"
          echo ""
          if [ "${{ needs.go-tests-coverage.result }}" != "success" ] || \
             [ "${{ needs.go-tests-race.result }}" != "success" ]; then
            echo "❌ Go tests did not pass (failure/cancelled/skipped)"
            exit 1
          fi
          echo "✓ All Go tests passed"

  # =======================================
  # Terraform CI Jobs (conditional on 'terraform' label)
  # =======================================

  # =======================================
  # Job: Terraform Format Check
  # =======================================
  terraform-fmt:
    needs: [setup-labels]
    name: Terraform Format Check
    runs-on: ubuntu-latest
    if: needs.setup-labels.outputs.has-terraform == 'true'
    outputs:
      fmt-outcome: ${{ steps.fmt.outcome }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: |
          echo "========================================="
          echo "Terraform Format Check"
          echo "========================================="
          cd terraform
          terraform fmt -check -recursive -diff
          echo "✓ All Terraform files are properly formatted"

  # =======================================
  # Job: Build Go Lambda Binaries (Parallel Matrix for Terraform)
  # =======================================
  terraform-build-lambdas:
    name: Build Lambda (${{ matrix.function }})
    runs-on: ubuntu-latest
    needs: [setup-labels]
    if: |
      needs.setup-labels.outputs.has-terraform == 'true' ||
      needs.setup-labels.outputs.has-go == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - function: posts-create
            path: posts/create
          - function: posts-get
            path: posts/get
          - function: posts-get_public
            path: posts/get_public
          - function: posts-list
            path: posts/list
          - function: posts-update
            path: posts/update
          - function: posts-delete
            path: posts/delete
          - function: auth-login
            path: auth/login
          - function: auth-logout
            path: auth/logout
          - function: auth-refresh
            path: auth/refresh
          - function: images-get_upload_url
            path: images/get_upload_url
          - function: images-delete
            path: images/delete
          - function: categories-list
            path: categories/list
          - function: categories-create
            path: categories/create
          - function: categories-update
            path: categories/update
          - function: categories-bulk_sort
            path: categories/bulk_sort
          - function: categories-delete
            path: categories/delete
          - function: mindmaps-create
            path: mindmaps/create
          - function: mindmaps-get
            path: mindmaps/get
          - function: mindmaps-list
            path: mindmaps/list
          - function: mindmaps-update
            path: mindmaps/update
          - function: mindmaps-delete
            path: mindmaps/delete
          - function: mindmaps-get_public
            path: mindmaps/get_public
          - function: mindmaps-list_public
            path: mindmaps/list_public
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache-dependency-path: go-functions/go.sum

      - name: Cache Lambda binary
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        id: binary-cache
        with:
          path: go-functions/bin/${{ matrix.function }}
          key: lambda-${{ matrix.function }}-${{ runner.os }}-${{ hashFiles('go-functions/**/*.go', 'go-functions/go.sum') }}

      - name: Build Lambda binary (${{ matrix.function }})
        if: steps.binary-cache.outputs.cache-hit != 'true'
        working-directory: go-functions
        run: |
          echo "========================================="
          echo "Building Lambda: ${{ matrix.function }}"
          echo "========================================="
          mkdir -p bin/${{ matrix.function }}
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -trimpath -buildvcs=false -ldflags="-s -w -buildid=" -tags="lambda.norpc" \
            -o bin/${{ matrix.function }}/bootstrap ./cmd/${{ matrix.path }}
          # Normalize timestamp for reproducible builds
          touch -t 202001010000.00 bin/${{ matrix.function }}/bootstrap
          echo "✓ ${{ matrix.function }} built successfully"

      - name: Cache hit status
        if: steps.binary-cache.outputs.cache-hit == 'true'
        run: echo "✓ ${{ matrix.function }} restored from cache"

      - name: Upload Lambda binary
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: lambda-${{ matrix.function }}
          path: go-functions/bin/${{ matrix.function }}/
          retention-days: 1

  # =======================================
  # Job: Merge Lambda Artifacts
  # =======================================
  terraform-merge-artifacts:
    name: Merge Lambda Artifacts
    runs-on: ubuntu-latest
    needs: [terraform-build-lambdas]
    if: needs.terraform-build-lambdas.result == 'success'
    steps:
      - name: Checkout code (for hash calculation)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          sparse-checkout: go-functions
          sparse-checkout-cone-mode: false

      - name: Download all Lambda artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          pattern: lambda-*
          path: go-functions/bin/
          merge-multiple: false

      - name: Reorganize artifacts
        run: |
          echo "========================================="
          echo "Merging Lambda Artifacts"
          echo "========================================="
          cd go-functions/bin
          for dir in lambda-*; do
            func_name="${dir#lambda-}"
            if [ -d "$dir" ]; then
              mkdir -p "$func_name"
              mv "$dir"/* "$func_name"/ 2>/dev/null || true
              rmdir "$dir" 2>/dev/null || true
            fi
          done
          echo "✓ Artifacts merged"
          ls -la

      - name: Verify all binaries present
        run: |
          echo "========================================="
          echo "Verifying Lambda Binaries"
          echo "========================================="
          FUNCS="posts-create posts-get posts-get_public posts-list posts-update posts-delete auth-login auth-logout auth-refresh images-get_upload_url images-delete categories-list categories-create categories-update categories-bulk_sort categories-delete mindmaps-create mindmaps-get mindmaps-list mindmaps-update mindmaps-delete mindmaps-get_public mindmaps-list_public"
          MISSING=0
          for f in $FUNCS; do
            if [ -f "go-functions/bin/$f/bootstrap" ]; then
              echo "✓ $f"
            else
              echo "✗ $f - MISSING"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ $MISSING -gt 0 ]; then
            echo "ERROR: $MISSING binaries missing!"
            exit 1
          fi
          echo "✓ All 23 binaries verified"

      - name: Save combined Lambda cache
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: go-functions/bin
          key: lambda-all-${{ runner.os }}-${{ hashFiles('go-functions/**/*.go', 'go-functions/go.sum') }}

      - name: Upload merged Lambda binaries
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: lambda-binaries
          path: go-functions/bin/
          retention-days: 1

  # =======================================
  # Job: Terraform Validate (DEV)
  # =======================================
  terraform-validate-dev:
    name: Terraform Validate (DEV)
    runs-on: ubuntu-latest
    needs: [setup-labels, terraform-fmt]
    if: |
      needs.setup-labels.outputs.has-terraform == 'true' &&
      needs.terraform-fmt.result == 'success' &&
      github.base_ref == 'develop'
    env:
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Create Terraform plugin cache dir
        run: mkdir -p ${{ github.workspace }}/.terraform.d/plugin-cache

      - name: Cache Terraform providers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ github.workspace }}/.terraform.d/plugin-cache
          key: terraform-providers-${{ runner.os }}-${{ hashFiles('terraform/**/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-providers-${{ runner.os }}-

      - name: Terraform Init (backend disabled)
        working-directory: terraform/environments/dev
        run: |
          terraform init -backend=false
          echo "✓ Terraform initialized"

      - name: Terraform Validate
        working-directory: terraform/environments/dev
        run: |
          terraform validate
          echo "✓ Configuration is valid"

  # =======================================
  # Job: Terraform Validate (PRD)
  # =======================================
  terraform-validate-prd:
    name: Terraform Validate (PRD)
    runs-on: ubuntu-latest
    needs: [setup-labels, terraform-fmt]
    if: |
      needs.setup-labels.outputs.has-terraform == 'true' &&
      needs.terraform-fmt.result == 'success' &&
      github.base_ref == 'main'
    env:
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Create Terraform plugin cache dir
        run: mkdir -p ${{ github.workspace }}/.terraform.d/plugin-cache

      - name: Cache Terraform providers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ github.workspace }}/.terraform.d/plugin-cache
          key: terraform-providers-${{ runner.os }}-${{ hashFiles('terraform/**/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-providers-${{ runner.os }}-

      - name: Terraform Init (backend disabled)
        working-directory: terraform/environments/prd
        run: |
          terraform init -backend=false
          echo "✓ Terraform initialized"

      - name: Terraform Validate
        working-directory: terraform/environments/prd
        run: |
          terraform validate
          echo "✓ Configuration is valid"

  # =======================================
  # Job: Checkov Security Scan
  # =======================================
  terraform-security-scan:
    name: Checkov Security Scan
    runs-on: ubuntu-latest
    needs: [setup-labels, terraform-fmt]
    if: |
      needs.setup-labels.outputs.has-terraform == 'true' &&
      needs.terraform-fmt.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Checkov Security Scan
        id: checkov
        uses: bridgecrewio/checkov-action@05d9f3cd4807c3dea7444d4e60dc44ad57928ab5 # v12.3084.0
        with:
          directory: terraform
          config_file: terraform/.checkov.yaml
          soft_fail: true
          output_format: cli,sarif
          output_file_path: console,results.sarif
          download_external_modules: false
          log_level: WARNING

      - name: Checkov Summary
        if: always()
        run: |
          echo "========================================="
          echo "Checkov Security Scan Summary"
          echo "========================================="
          if [ "${{ steps.checkov.outcome }}" == "success" ]; then
            echo "✓ No security issues detected"
          else
            echo "⚠ Security issues detected - review logs above"
          fi

  # =======================================
  # Job: Terraform Test
  # =======================================
  terraform-test:
    name: Terraform Test
    runs-on: ubuntu-latest
    needs: [setup-labels, terraform-fmt]
    if: |
      needs.setup-labels.outputs.has-terraform == 'true' &&
      needs.terraform-fmt.result == 'success'
    env:
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Create Terraform plugin cache dir
        run: mkdir -p ${{ github.workspace }}/.terraform.d/plugin-cache

      - name: Cache Terraform providers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ github.workspace }}/.terraform.d/plugin-cache
          key: terraform-providers-${{ runner.os }}-${{ hashFiles('terraform/**/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-providers-${{ runner.os }}-

      - name: Run Terraform Tests
        working-directory: terraform
        run: |
          echo "========================================="
          echo "Terraform Module Tests"
          echo "========================================="
          terraform init -backend=false
          if find . -name "*.tftest.hcl" -type f | head -1 | grep -q .; then
            echo "Running terraform test..."
            terraform test
            echo "✓ All module tests passed"
          else
            echo "ℹ No test files found (.tftest.hcl)"
          fi

  # =======================================
  # Job: Terraform Plan (DEV)
  # =======================================
  terraform-plan-dev:
    name: Terraform Plan (DEV)
    runs-on: ubuntu-latest
    needs: [setup-labels, terraform-validate-dev, terraform-merge-artifacts]
    environment: dev
    if: |
      always() &&
      needs.setup-labels.outputs.has-terraform == 'true' &&
      needs.terraform-validate-dev.result == 'success' &&
      needs.terraform-merge-artifacts.result == 'success' &&
      github.base_ref == 'develop'
    env:
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
    outputs:
      plan-exitcode: ${{ steps.plan.outputs.exitcode }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download Lambda binaries
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: lambda-binaries
          path: go-functions/bin

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-TerraformPlan-DEV

      - name: Create Terraform plugin cache dir
        run: mkdir -p ${{ github.workspace }}/.terraform.d/plugin-cache

      - name: Cache Terraform providers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ github.workspace }}/.terraform.d/plugin-cache
          key: terraform-providers-${{ runner.os }}-${{ hashFiles('terraform/**/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-providers-${{ runner.os }}-

      - name: Terraform Init
        working-directory: terraform/environments/dev
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: terraform/environments/dev
        run: |
          terraform plan -out=tfplan.binary -detailed-exitcode -no-color 2>&1 | tee tfplan_output.txt || exitcode=$?
          terraform show -json tfplan.binary > tfplan.json
          terraform show -no-color tfplan.binary > tfplan.txt
          echo "exitcode=${exitcode:-0}" >> $GITHUB_OUTPUT

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: terraform-plan-dev
          path: |
            terraform/environments/dev/tfplan.binary
            terraform/environments/dev/tfplan.json
            terraform/environments/dev/tfplan.txt
          retention-days: 7

      - name: Comment Plan on PR
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const fs = require('fs');
            const planPath = 'terraform/environments/dev/tfplan.txt';
            let plan = fs.existsSync(planPath) ? fs.readFileSync(planPath, 'utf8') : 'Plan not available';
            if (plan.length > 60000) {
              plan = plan.substring(0, 60000) + '\n\n... (truncated)';
            }
            const summaryMatch = plan.match(/Plan: (\d+) to add, (\d+) to change, (\d+) to destroy/);
            const summary = summaryMatch
              ? `**${summaryMatch[1]}** to add, **${summaryMatch[2]}** to change, **${summaryMatch[3]}** to destroy`
              : plan.includes('No changes') ? '✅ No changes' : 'Summary not available';

            const output = `## 📋 Terraform Plan (DEV)\n\n### Summary\n${summary}\n\n<details>\n<summary>Show Plan Details</summary>\n\n\`\`\`hcl\n${plan}\n\`\`\`\n\n</details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

