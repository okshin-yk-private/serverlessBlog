  frontend-public-tests:
    needs: [setup-labels]
    name: Frontend Tests (Public Site)
    runs-on: ubuntu-latest
    if: needs.setup-labels.outputs.has-frontend == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: latest

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install frontend (public) dependencies
        working-directory: frontend/public
        run: bun install --frozen-lockfile

      - name: Run frontend (public) tests with coverage
        working-directory: frontend/public
        run: bun run test:coverage
        env:
          CI: true

      - name: Upload frontend (public) coverage reports
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with:
          name: frontend-public-coverage
          path: frontend/public/coverage/
