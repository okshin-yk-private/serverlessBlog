  # =======================================
  e2e-admin-tests:
    name: E2E Tests (Admin - Auth & Security)
    runs-on: ubuntu-latest
    needs: [frontend-admin-tests]
    if: |
      !cancelled() &&
      (needs.frontend-admin-tests.result == 'success')

