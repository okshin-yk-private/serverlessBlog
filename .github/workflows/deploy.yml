# AWS CDK Deployment Workflow (PR-based)
# Requirement R31: GitHub Actions CI/CD デプロイワークフロー
# Requirement R45: 継続的テスト実行（デプロイ前のテスト実行確認）
#
# このワークフローはAWS CDKとフロントエンドをデプロイします
# - develop ブランチ → dev環境へ自動デプロイ
# - main ブランチ → prd環境へ手動承認後デプロイ
#
# PRベースのワークフロー:
# - PRでCI実行（ci.yml）
# - developまたはmainへのマージ後にデプロイ実行（このワークフロー）
#
# DRY原則に基づき、単一のdeployジョブで全環境に対応
# 各ブランチのEnvironment Secretsに AWS_ROLE_ARN を設定

name: Deploy to AWS

on:
  push:
    branches:
      - develop
      - main

# AWS OIDC認証のための権限設定
permissions:
  id-token: write  # OIDCトークン取得に必要
  contents: read   # リポジトリの読み取りに必要

jobs:
  # =======================================
  # Deploy Infrastructure Job
  # =======================================
  deploy-infrastructure:
    name: Deploy Infrastructure to ${{ github.ref == 'refs/heads/main' && 'Production' || 'Development' }}
    runs-on: ubuntu-latest
    outputs:
      public-bucket-name: ${{ steps.get-stack-outputs.outputs.public-bucket-name }}
      admin-bucket-name: ${{ steps.get-stack-outputs.outputs.admin-bucket-name }}
      public-distribution-id: ${{ steps.get-stack-outputs.outputs.public-distribution-id }}
      admin-distribution-id: ${{ steps.get-stack-outputs.outputs.admin-distribution-id }}
    environment:
      # ブランチ名から環境名を動的に決定: develop → dev, main → prod
      name: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
      url: ${{ github.ref == 'refs/heads/main' && 'https://yourblog.example.com' || 'https://dev.yourblog.example.com' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set environment stage
        id: env
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "stage=prd" >> $GITHUB_OUTPUT
            echo "env_name=Production" >> $GITHUB_OUTPUT
          else
            echo "stage=dev" >> $GITHUB_OUTPUT
            echo "env_name=Development" >> $GITHUB_OUTPUT
          fi

      - name: Install root dependencies
        run: npm ci

      - name: Install infrastructure dependencies
        working-directory: infrastructure
        run: npm ci

      - name: Install Lambda Layer dependencies (Common)
        working-directory: layers/common/nodejs
        run: npm ci

      - name: Install Lambda Layer dependencies (Powertools)
        working-directory: layers/powertools/nodejs
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # 各環境のEnvironment SecretからAWS_ROLE_ARNを取得
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActions-Deploy-${{ steps.env.outputs.stage }}

      - name: Get AWS Account ID
        id: aws-account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "::add-mask::$ACCOUNT_ID"
          echo "account-id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "AWS Account ID: ***"

      - name: CDK Bootstrap (if needed)
        working-directory: infrastructure
        run: |
          echo "========================================="
          echo "CDK Bootstrap Check"
          echo "========================================="
          echo "Account ID: ${{ steps.aws-account.outputs.account-id }}"
          echo "Region: ${{ vars.AWS_REGION }}"
          echo ""

          # Bootstrap実行
          if npx cdk bootstrap aws://${{ steps.aws-account.outputs.account-id }}/${{ vars.AWS_REGION }}; then
            echo "✓ CDK Bootstrap successful"
          else
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 0 ]; then
              echo "✓ Environment already bootstrapped"
            else
              echo "✗ CDK Bootstrap failed with exit code: $EXIT_CODE"
              exit $EXIT_CODE
            fi
          fi

      - name: Get Basic Auth Credentials from Parameter Store (DEV only)
        id: basic-auth
        if: steps.env.outputs.stage == 'dev'
        run: |
          echo "Retrieving Basic Auth credentials from Parameter Store..."
          USERNAME=$(aws ssm get-parameter --name "/serverless-blog/dev/basic-auth/username" --region ap-northeast-1 --query "Parameter.Value" --output text)
          PASSWORD=$(aws ssm get-parameter --name "/serverless-blog/dev/basic-auth/password" --with-decryption --region ap-northeast-1 --query "Parameter.Value" --output text)

          # Mask sensitive values in logs
          echo "::add-mask::$USERNAME"
          echo "::add-mask::$PASSWORD"

          # Export as outputs
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
          echo "✓ Basic Auth credentials retrieved successfully"

      - name: CDK Diff
        working-directory: infrastructure
        env:
          # DEV環境Basic認証用の環境変数（Parameter Storeから取得）
          BASIC_AUTH_USERNAME: ${{ steps.basic-auth.outputs.username }}
          BASIC_AUTH_PASSWORD: ${{ steps.basic-auth.outputs.password }}
        run: |
          echo "========================================="
          echo "CDK Diff - ${{ steps.env.outputs.env_name }} Environment"
          echo "========================================="
          npx cdk diff --all --context stage=${{ steps.env.outputs.stage }}
        continue-on-error: true

      - name: CDK Deploy
        working-directory: infrastructure
        env:
          # DEV環境Basic認証用の環境変数（Parameter Storeから取得）
          BASIC_AUTH_USERNAME: ${{ steps.basic-auth.outputs.username }}
          BASIC_AUTH_PASSWORD: ${{ steps.basic-auth.outputs.password }}
        run: |
          echo "========================================="
          echo "CDK Deploy - ${{ steps.env.outputs.env_name }} Environment"
          echo "========================================="
          if [ "${{ steps.env.outputs.stage }}" == "prd" ]; then
            echo "⚠️  Deploying to PRODUCTION"
            echo ""
          fi
          npx cdk deploy --all --require-approval never --context stage=${{ steps.env.outputs.stage }} --ci --outputs-file cdk-outputs.json 2>&1 | grep -v "arn:aws" | grep -v "https://" | grep -v "^ServerlessBlog.*Stack\." || true
          echo "✓ CDK Deployment completed successfully"

      - name: Get Stack Outputs
        id: get-stack-outputs
        run: |
          echo "========================================="
          echo "Retrieving CloudFormation Stack Outputs"
          echo "========================================="

          # Get outputs from Storage Stack
          PUBLIC_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ServerlessBlogStorageStack \
            --query "Stacks[0].Outputs[?OutputKey=='PublicSiteBucketName'].OutputValue" \
            --output text)

          ADMIN_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ServerlessBlogStorageStack \
            --query "Stacks[0].Outputs[?OutputKey=='AdminSiteBucketName'].OutputValue" \
            --output text)

          # Get outputs from CDN Stack
          PUBLIC_DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name ServerlessBlogCdnStack \
            --query "Stacks[0].Outputs[?OutputKey=='PublicSiteDistributionId'].OutputValue" \
            --output text)

          ADMIN_DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name ServerlessBlogCdnStack \
            --query "Stacks[0].Outputs[?OutputKey=='AdminSiteDistributionId'].OutputValue" \
            --output text)

          # Mask sensitive values
          echo "::add-mask::$PUBLIC_BUCKET"
          echo "::add-mask::$ADMIN_BUCKET"
          echo "::add-mask::$PUBLIC_DIST_ID"
          echo "::add-mask::$ADMIN_DIST_ID"

          echo "Public Bucket: ***"
          echo "Admin Bucket: ***"
          echo "Public Distribution ID: ***"
          echo "Admin Distribution ID: ***"

          # Set outputs for next job
          echo "public-bucket-name=$PUBLIC_BUCKET" >> $GITHUB_OUTPUT
          echo "admin-bucket-name=$ADMIN_BUCKET" >> $GITHUB_OUTPUT
          echo "public-distribution-id=$PUBLIC_DIST_ID" >> $GITHUB_OUTPUT
          echo "admin-distribution-id=$ADMIN_DIST_ID" >> $GITHUB_OUTPUT

      - name: Deployment Summary
        if: success()
        run: |
          echo "========================================="
          echo "✓ Infrastructure Deployment to ${{ steps.env.outputs.env_name }} Environment Complete!"
          echo "========================================="
          echo ""
          echo "Environment: ${{ steps.env.outputs.stage }}"
          echo "Region: ${{ vars.AWS_REGION }}"
          echo "Git Branch: ${{ github.ref_name }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo ""
          if [ "${{ steps.env.outputs.stage }}" == "prd" ]; then
            echo "⚠️  PRODUCTION DEPLOYMENT SUCCESSFUL"
          fi

  # =======================================
  # Deploy Frontend Job
  # =======================================
  deploy-frontend:
    name: Deploy Frontend to ${{ github.ref == 'refs/heads/main' && 'Production' || 'Development' }}
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
      url: ${{ github.ref == 'refs/heads/main' && 'https://yourblog.example.com' || 'https://dev.yourblog.example.com' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set environment stage
        id: env
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "stage=prd" >> $GITHUB_OUTPUT
            echo "env_name=Production" >> $GITHUB_OUTPUT
          else
            echo "stage=dev" >> $GITHUB_OUTPUT
            echo "env_name=Development" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActions-DeployFrontend-${{ steps.env.outputs.stage }}

      # =======================================
      # Public Site Deployment
      # =======================================
      - name: Install Public Site dependencies
        working-directory: frontend/public
        run: npm ci

      - name: Build Public Site
        working-directory: frontend/public
        run: npm run build
        env:
          VITE_API_ENDPOINT: ${{ secrets.API_ENDPOINT }}
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}

      - name: Deploy Public Site to S3
        run: |
          echo "========================================="
          echo "Deploying Public Site to S3"
          echo "========================================="
          # 静的アセット（JS/CSS/画像）を1年キャッシュ
          aws s3 sync frontend/public/dist/ s3://${{ needs.deploy-infrastructure.outputs.public-bucket-name }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "*.map"
          # index.htmlは即時更新
          aws s3 cp frontend/public/dist/index.html s3://${{ needs.deploy-infrastructure.outputs.public-bucket-name }}/ \
            --cache-control "public,max-age=0,must-revalidate"
          echo "✓ Public Site deployed to S3"

      - name: Invalidate Public Site CloudFront Cache
        run: |
          echo "Invalidating CloudFront cache for Public Site..."
          aws cloudfront create-invalidation \
            --distribution-id ${{ needs.deploy-infrastructure.outputs.public-distribution-id }} \
            --paths "/*"
          echo "✓ CloudFront cache invalidated"

      # =======================================
      # Admin Site Deployment
      # =======================================
      - name: Install Admin Site dependencies
        working-directory: frontend/admin
        run: npm ci

      - name: Build Admin Site
        working-directory: frontend/admin
        run: npm run build
        env:
          VITE_API_ENDPOINT: ${{ secrets.API_ENDPOINT }}
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}

      - name: Deploy Admin Site to S3
        run: |
          echo "========================================="
          echo "Deploying Admin Site to S3"
          echo "========================================="
          # 静的アセット（JS/CSS/画像）を1年キャッシュ
          aws s3 sync frontend/admin/dist/ s3://${{ needs.deploy-infrastructure.outputs.admin-bucket-name }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "*.map"
          # index.htmlは即時更新
          aws s3 cp frontend/admin/dist/index.html s3://${{ needs.deploy-infrastructure.outputs.admin-bucket-name }}/ \
            --cache-control "public,max-age=0,must-revalidate"
          echo "✓ Admin Site deployed to S3"

      - name: Invalidate Admin Site CloudFront Cache
        run: |
          echo "Invalidating CloudFront cache for Admin Site..."
          aws cloudfront create-invalidation \
            --distribution-id ${{ needs.deploy-infrastructure.outputs.admin-distribution-id }} \
            --paths "/*"
          echo "✓ CloudFront cache invalidated"

      - name: Frontend Deployment Summary
        if: success()
        run: |
          echo "========================================="
          echo "✓ Frontend Deployment to ${{ steps.env.outputs.env_name }} Environment Complete!"
          echo "========================================="
          echo ""
          echo "Environment: ${{ steps.env.outputs.stage }}"
          echo "Git Branch: ${{ github.ref_name }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo ""
          echo "✓ Public Site deployed and cache invalidated"
          echo "✓ Admin Site deployed and cache invalidated"
          echo ""
          if [ "${{ steps.env.outputs.stage }}" == "prd" ]; then
            echo "⚠️  PRODUCTION FRONTEND DEPLOYMENT SUCCESSFUL"
          fi
