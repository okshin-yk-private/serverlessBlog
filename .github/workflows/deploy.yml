# AWS CDK Deployment Workflow
# Requirement R31: GitHub Actions CI/CD デプロイワークフロー
# Requirement R45: 継続的テスト実行（デプロイ前のテスト実行確認）
#
# このワークフローはAWS CDKを使用してインフラストラクチャをデプロイします
# - develop ブランチ → dev環境へ自動デプロイ
# - main ブランチ → prd環境へ手動承認後デプロイ
#
# DRY原則に基づき、単一のdeployジョブで全環境に対応
# 各ブランチのEnvironment Secretsに AWS_ROLE_ARN を設定

name: Deploy to AWS

on:
  push:
    branches:
      - develop
      - main

# AWS OIDC認証のための権限設定
permissions:
  id-token: write  # OIDCトークン取得に必要
  contents: read   # リポジトリの読み取りに必要

jobs:
  # =======================================
  # Deploy Job (DRY - 全環境共通)
  # =======================================
  deploy:
    name: Deploy to ${{ github.ref == 'refs/heads/main' && 'Production' || 'Development' }} Environment
    runs-on: ubuntu-latest
    # develop または main ブランチへのpush時のみ実行
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    environment:
      # ブランチ名から環境名を動的に決定: develop → dev, main → prod
      name: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
      url: ${{ github.ref == 'refs/heads/main' && 'https://yourblog.example.com' || 'https://dev.yourblog.example.com' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set environment stage
        id: env
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "stage=prd" >> $GITHUB_OUTPUT
            echo "env_name=Production" >> $GITHUB_OUTPUT
          else
            echo "stage=dev" >> $GITHUB_OUTPUT
            echo "env_name=Development" >> $GITHUB_OUTPUT
          fi

      - name: Install root dependencies
        run: npm ci

      - name: Install infrastructure dependencies
        working-directory: infrastructure
        run: npm ci

      - name: Install Lambda Layer dependencies (Common)
        working-directory: layers/common/nodejs
        run: npm ci

      - name: Install Lambda Layer dependencies (Powertools)
        working-directory: layers/powertools/nodejs
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # 各環境のEnvironment SecretからAWS_ROLE_ARNを取得
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActions-Deploy-${{ steps.env.outputs.stage }}

      - name: Get AWS Account ID
        id: aws-account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account-id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "AWS Account ID: $ACCOUNT_ID"

      - name: CDK Bootstrap (if needed)
        working-directory: infrastructure
        run: |
          echo "========================================="
          echo "CDK Bootstrap Check"
          echo "========================================="
          echo "Account ID: ${{ steps.aws-account.outputs.account-id }}"
          echo "Region: ${{ vars.AWS_REGION }}"
          echo ""

          # Bootstrap実行
          if npx cdk bootstrap aws://${{ steps.aws-account.outputs.account-id }}/${{ vars.AWS_REGION }}; then
            echo "✓ CDK Bootstrap successful"
          else
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 0 ]; then
              echo "✓ Environment already bootstrapped"
            else
              echo "✗ CDK Bootstrap failed with exit code: $EXIT_CODE"
              exit $EXIT_CODE
            fi
          fi

      - name: CDK Diff
        working-directory: infrastructure
        run: |
          echo "========================================="
          echo "CDK Diff - ${{ steps.env.outputs.env_name }} Environment"
          echo "========================================="
          npx cdk diff --all --context stage=${{ steps.env.outputs.stage }}
        continue-on-error: true

      - name: CDK Deploy
        working-directory: infrastructure
        run: |
          echo "========================================="
          echo "CDK Deploy - ${{ steps.env.outputs.env_name }} Environment"
          echo "========================================="
          if [ "${{ steps.env.outputs.stage }}" == "prd" ]; then
            echo "⚠️  Deploying to PRODUCTION"
            echo ""
          fi
          npx cdk deploy --all --require-approval never --context stage=${{ steps.env.outputs.stage }}

      - name: Deployment Summary
        if: success()
        run: |
          echo "========================================="
          echo "✓ Deployment to ${{ steps.env.outputs.env_name }} Environment Complete!"
          echo "========================================="
          echo ""
          echo "Environment: ${{ steps.env.outputs.stage }}"
          echo "Region: ${{ vars.AWS_REGION }}"
          echo "Git Branch: ${{ github.ref_name }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Account ID: ${{ steps.aws-account.outputs.account-id }}"
          echo ""
          if [ "${{ steps.env.outputs.stage }}" == "prd" ]; then
            echo "⚠️  PRODUCTION DEPLOYMENT SUCCESSFUL"
          fi
