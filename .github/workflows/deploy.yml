# AWS CDK Deployment Workflow (PR-based)
# Requirement R31: GitHub Actions CI/CD デプロイワークフロー
# Requirement R45: 継続的テスト実行（デプロイ前のテスト実行確認）
# Requirement 6.5: Go Lambdaビルドジョブの追加（Rustビルドと同じパターン）
#
# このワークフローはAWS CDKとフロントエンドをデプロイします
# - develop ブランチ → dev環境へ自動デプロイ
# - main ブランチ → prd環境へ手動承認後デプロイ
#
# PRベースのワークフロー:
# - PRでCI実行（ci.yml）
# - developまたはmainへのマージ後にデプロイ実行（このワークフロー）
#
# 最適化: Matrix並列ビルド + ハイブリッドキャッシュで高速化
# - Rust: cargo-lambda + Zig cross-compilation
# - Go: go build direct cross-compilation

name: Deploy to AWS

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:
    inputs:
      force_rust_rebuild:
        description: 'Force rebuild all Rust Lambdas (ignore cache)'
        required: false
        default: false
        type: boolean

# AWS OIDC認証のための権限設定
permissions:
  id-token: write # OIDCトークン取得に必要
  contents: read # リポジトリの読み取りに必要

jobs:
  # =======================================
  # Build Rust Lambdas Job (Matrix Parallel)
  # =======================================
  build-rust-lambdas:
    name: Build ${{ matrix.lambda }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Posts domain
          - lambda: create_post
            path: posts/create_post
          - lambda: get_post
            path: posts/get_post
          - lambda: get_public_post
            path: posts/get_public_post
          - lambda: list_posts
            path: posts/list_posts
          - lambda: update_post
            path: posts/update_post
          - lambda: delete_post
            path: posts/delete_post
          # Auth domain
          - lambda: login
            path: auth/login
          - lambda: logout
            path: auth/logout
          - lambda: refresh
            path: auth/refresh
          # Images domain
          - lambda: get_upload_url
            path: images/get_upload_url
          - lambda: delete_image
            path: images/delete_image

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.92'
          targets: aarch64-unknown-linux-gnu

      - name: Install Cargo Lambda
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-lambda

      - name: Install Zig (cross-compilation for ARM64)
        uses: mlugg/setup-zig@v1
        with:
          version: 0.14.0

      # =======================================
      # Hybrid Cache Strategy
      # =======================================
      # Step 1: Shared Cargo registry/git cache (all matrix jobs share this)
      - name: Cache Cargo registry and git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-deps-${{ hashFiles('rust-functions/Cargo.lock') }}
          restore-keys: |
            cargo-deps-

      # Step 2: Per-Lambda build artifacts cache
      - name: Cache Cargo build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rust-functions -> target"
          prefix-key: "v1-rust"
          shared-key: "lambda-${{ matrix.lambda }}"
          cache-on-failure: true
          cache-all-crates: "true"

      - name: Build Lambda ${{ matrix.lambda }}
        working-directory: rust-functions
        run: |
          echo "========================================="
          echo "Building Lambda: ${{ matrix.lambda }}"
          echo "========================================="

          cargo lambda build --profile release-fast --arm64 --package ${{ matrix.lambda }}

          # Rename binary to "bootstrap" as required by Lambda runtime
          if [ -f "target/lambda/${{ matrix.lambda }}/${{ matrix.lambda }}" ]; then
            mv "target/lambda/${{ matrix.lambda }}/${{ matrix.lambda }}" "target/lambda/${{ matrix.lambda }}/bootstrap"
          fi

          echo "✓ Build complete"
          ls -la target/lambda/${{ matrix.lambda }}/

      - name: Upload Lambda artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-${{ matrix.lambda }}
          path: rust-functions/target/lambda/${{ matrix.lambda }}/bootstrap
          retention-days: 1
          if-no-files-found: error

  # =======================================
  # Build Go Lambdas Job (Matrix Parallel)
  # Requirement 6.5: Go Lambdaビルドジョブの追加（Rustビルドと同じパターン）
  # =======================================
  build-go-lambdas:
    name: Build Go ${{ matrix.lambda }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Posts domain
          - lambda: posts-create
            path: posts/create
          - lambda: posts-get
            path: posts/get
          - lambda: posts-get_public
            path: posts/get_public
          - lambda: posts-list
            path: posts/list
          - lambda: posts-update
            path: posts/update
          - lambda: posts-delete
            path: posts/delete
          # Auth domain
          - lambda: auth-login
            path: auth/login
          - lambda: auth-logout
            path: auth/logout
          - lambda: auth-refresh
            path: auth/refresh
          # Images domain
          - lambda: images-get_upload_url
            path: images/get_upload_url
          - lambda: images-delete
            path: images/delete

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: go-functions/go.sum

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-build-${{ hashFiles('go-functions/go.sum') }}-${{ matrix.lambda }}
          restore-keys: |
            go-build-${{ hashFiles('go-functions/go.sum') }}-
            go-build-

      - name: Build Lambda ${{ matrix.lambda }}
        working-directory: go-functions
        run: |
          echo "========================================="
          echo "Building Go Lambda: ${{ matrix.lambda }}"
          echo "========================================="

          # ARM64 cross-compilation for Lambda (provided.al2023)
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -ldflags="-s -w" -tags=lambda.norpc \
            -o bin/${{ matrix.lambda }}/bootstrap ./cmd/${{ matrix.path }}

          echo "✓ Build complete"
          ls -la bin/${{ matrix.lambda }}/

      - name: Upload Lambda artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-lambda-${{ matrix.lambda }}
          path: go-functions/bin/${{ matrix.lambda }}/bootstrap
          retention-days: 1
          if-no-files-found: error

  # =======================================
  # Deploy Infrastructure Job
  # =======================================
  deploy-infrastructure:
    name: Deploy Infrastructure to ${{ github.ref == 'refs/heads/main' && 'Production' || 'Development' }}
    runs-on: ubuntu-latest
    needs: [build-rust-lambdas, build-go-lambdas]
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set environment stage
        id: env
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "stage=prd" >> $GITHUB_OUTPUT
            echo "env_name=Production" >> $GITHUB_OUTPUT
          else
            echo "stage=dev" >> $GITHUB_OUTPUT
            echo "env_name=Development" >> $GITHUB_OUTPUT
          fi

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install infrastructure dependencies
        working-directory: infrastructure
        run: bun install --frozen-lockfile

      - name: Install Lambda Layer dependencies (Common)
        working-directory: layers/common/nodejs
        run: bun install --frozen-lockfile

      - name: Install Lambda Layer dependencies (Powertools)
        working-directory: layers/powertools/nodejs
        run: bun install --frozen-lockfile

      # =======================================
      # Download Pre-built Lambda Artifacts (Rust)
      # =======================================
      - name: Download all Rust Lambda artifacts
        uses: actions/download-artifact@v4
        with:
          path: rust-functions/target/lambda
          pattern: lambda-*
          merge-multiple: false

      - name: Organize Rust Lambda binaries
        run: |
          echo "========================================="
          echo "Organizing Rust Lambda binaries"
          echo "========================================="

          cd rust-functions/target/lambda

          # Move binaries from artifact directories to expected structure
          for dir in lambda-*/; do
            lambda_name="${dir#lambda-}"
            lambda_name="${lambda_name%/}"

            if [ -f "$dir/bootstrap" ]; then
              mkdir -p "$lambda_name"
              mv "$dir/bootstrap" "$lambda_name/bootstrap"
              echo "✓ Rust: $lambda_name"
            fi
          done

          # Clean up artifact directories
          rm -rf lambda-*/

          echo ""
          echo "Rust Lambda binaries ready:"
          ls -la */

      # =======================================
      # Download Pre-built Lambda Artifacts (Go)
      # Requirement 6.5: Go Lambdaビルド成果物のダウンロード
      # =======================================
      - name: Download all Go Lambda artifacts
        uses: actions/download-artifact@v4
        with:
          path: go-functions/bin
          pattern: go-lambda-*
          merge-multiple: false

      - name: Organize Go Lambda binaries
        run: |
          echo "========================================="
          echo "Organizing Go Lambda binaries"
          echo "========================================="

          cd go-functions/bin

          # Move binaries from artifact directories to expected structure
          for dir in go-lambda-*/; do
            lambda_name="${dir#go-lambda-}"
            lambda_name="${lambda_name%/}"

            if [ -f "$dir/bootstrap" ]; then
              mkdir -p "$lambda_name"
              mv "$dir/bootstrap" "$lambda_name/bootstrap"
              echo "✓ Go: $lambda_name"
            fi
          done

          # Clean up artifact directories
          rm -rf go-lambda-*/

          echo ""
          echo "Go Lambda binaries ready:"
          ls -la */

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActions-Deploy-${{ steps.env.outputs.stage }}

      - name: Get AWS Account ID
        id: aws-account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "::add-mask::$ACCOUNT_ID"
          echo "account-id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "AWS Account ID: ***"

      - name: Get Basic Auth Credentials from Parameter Store (DEV only)
        id: basic-auth
        if: steps.env.outputs.stage == 'dev'
        run: |
          echo "Retrieving Basic Auth credentials from Parameter Store..."
          USERNAME=$(aws ssm get-parameter --name "/serverless-blog/dev/basic-auth/username" --region ap-northeast-1 --query "Parameter.Value" --output text)
          PASSWORD=$(aws ssm get-parameter --name "/serverless-blog/dev/basic-auth/password" --with-decryption --region ap-northeast-1 --query "Parameter.Value" --output text)

          # Mask sensitive values in logs
          echo "::add-mask::$USERNAME"
          echo "::add-mask::$PASSWORD"

          # Export as outputs
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
          echo "✓ Basic Auth credentials retrieved successfully"

      - name: CDK Bootstrap (if needed)
        working-directory: infrastructure
        env:
          BASIC_AUTH_USERNAME: ${{ steps.basic-auth.outputs.username }}
          BASIC_AUTH_PASSWORD: ${{ steps.basic-auth.outputs.password }}
        run: |
          echo "========================================="
          echo "CDK Bootstrap Check"
          echo "========================================="
          echo "Account ID: ${{ steps.aws-account.outputs.account-id }}"
          echo "Region: ${{ vars.AWS_REGION }}"
          echo ""

          if bunx cdk bootstrap aws://${{ steps.aws-account.outputs.account-id }}/${{ vars.AWS_REGION }}; then
            echo "✓ CDK Bootstrap successful"
          else
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 0 ]; then
              echo "✓ Environment already bootstrapped"
            else
              echo "✗ CDK Bootstrap failed with exit code: $EXIT_CODE"
              exit $EXIT_CODE
            fi
          fi

      - name: CDK Deploy (Phase 1 - Base Infrastructure)
        working-directory: infrastructure
        env:
          BASIC_AUTH_USERNAME: ${{ steps.basic-auth.outputs.username }}
          BASIC_AUTH_PASSWORD: ${{ steps.basic-auth.outputs.password }}
        run: |
          echo "========================================="
          echo "CDK Deploy Phase 1 - Base Infrastructure"
          echo "========================================="
          if [ "${{ steps.env.outputs.stage }}" == "prd" ]; then
            echo "⚠️  Deploying to PRODUCTION"
            echo ""
          fi
          # Deploy base stacks first (no cross-stack Lambda references)
          bunx cdk deploy \
            ServerlessBlogLayersStack \
            ServerlessBlogDatabaseStack \
            ServerlessBlogStorageStack \
            ServerlessBlogAuthStack \
            ServerlessBlogApiStack \
            ServerlessBlogCdnStack \
            --require-approval never \
            --context stage=${{ steps.env.outputs.stage }} \
            --context goTrafficPercent=100 \
            --ci
          echo "✓ Phase 1 complete"

      - name: CDK Deploy (Phase 2 - Lambda Functions)
        working-directory: infrastructure
        env:
          BASIC_AUTH_USERNAME: ${{ steps.basic-auth.outputs.username }}
          BASIC_AUTH_PASSWORD: ${{ steps.basic-auth.outputs.password }}
        run: |
          echo "========================================="
          echo "CDK Deploy Phase 2 - Lambda Functions"
          echo "========================================="
          # Deploy Lambda stacks (Node.js always, Go when goTrafficPercent > 0)
          bunx cdk deploy \
            ServerlessBlogLambdaFunctionsStack \
            ServerlessBlogGoLambdaStack \
            --require-approval never \
            --context stage=${{ steps.env.outputs.stage }} \
            --context goTrafficPercent=100 \
            --ci
          echo "✓ Phase 2 complete"

      - name: CDK Deploy (Phase 3 - API Integrations & Monitoring)
        working-directory: infrastructure
        env:
          BASIC_AUTH_USERNAME: ${{ steps.basic-auth.outputs.username }}
          BASIC_AUTH_PASSWORD: ${{ steps.basic-auth.outputs.password }}
        run: |
          echo "========================================="
          echo "CDK Deploy Phase 3 - API Integrations & Monitoring"
          echo "========================================="
          # Deploy integration and monitoring stacks last
          bunx cdk deploy \
            ServerlessBlogApiIntegrationsStack \
            ServerlessBlogMonitoringStack \
            --require-approval never \
            --context stage=${{ steps.env.outputs.stage }} \
            --context goTrafficPercent=100 \
            --ci \
            --outputs-file cdk-outputs.json
          echo "✓ Phase 3 complete"
          echo "✓ CDK Deployment completed successfully"

      - name: Upload CDK Outputs
        uses: actions/upload-artifact@v4
        with:
          name: cdk-outputs
          path: infrastructure/cdk-outputs.json
          retention-days: 1

      - name: Deployment Summary
        if: success()
        working-directory: infrastructure
        run: |
          echo "========================================="
          echo "✓ Infrastructure Deployment to ${{ steps.env.outputs.env_name }} Environment Complete!"
          echo "========================================="
          echo ""
          echo "Environment: ${{ steps.env.outputs.stage }}"
          echo "Region: ${{ vars.AWS_REGION }}"
          echo "Git Branch: ${{ github.ref_name }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo ""
          echo "CloudFront URLs:"
          echo "  Public Site:  https://$(jq -r '.ServerlessBlogCdnStack.PublicSiteDistributionDomainName' cdk-outputs.json)"
          echo "  Admin Site:   https://$(jq -r '.ServerlessBlogCdnStack.AdminSiteDistributionDomainName' cdk-outputs.json)"
          echo "  Image CDN:    https://$(jq -r '.ServerlessBlogCdnStack.ImageDistributionDomainName' cdk-outputs.json)"
          echo ""
          if [ "${{ steps.env.outputs.stage }}" == "prd" ]; then
            echo "⚠️  PRODUCTION DEPLOYMENT SUCCESSFUL"
          fi

  # =======================================
  # Deploy Public Site Frontend Job
  # =======================================
  deploy-public-frontend:
    name: Deploy Public Site to ${{ github.ref == 'refs/heads/main' && 'Production' || 'Development' }}
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set environment stage
        id: env
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "stage=prd" >> $GITHUB_OUTPUT
            echo "env_name=Production" >> $GITHUB_OUTPUT
          else
            echo "stage=dev" >> $GITHUB_OUTPUT
            echo "env_name=Development" >> $GITHUB_OUTPUT
          fi

      - name: Download CDK Outputs
        uses: actions/download-artifact@v4
        with:
          name: cdk-outputs
          path: ./

      - name: Extract Stack Outputs
        id: outputs
        run: |
          PUBLIC_BUCKET=$(jq -r '.ServerlessBlogStorageStack.PublicSiteBucketName' cdk-outputs.json)
          PUBLIC_DIST_ID=$(jq -r '.ServerlessBlogCdnStack.PublicSiteDistributionId' cdk-outputs.json)
          PUBLIC_DIST_DOMAIN=$(jq -r '.ServerlessBlogCdnStack.PublicSiteDistributionDomainName' cdk-outputs.json)
          API_ENDPOINT=$(jq -r '.ServerlessBlogApiStack.ApiEndpoint' cdk-outputs.json)
          USER_POOL_ID=$(jq -r '.ServerlessBlogAuthStack.UserPoolId' cdk-outputs.json)

          echo "public-bucket=$PUBLIC_BUCKET" >> $GITHUB_OUTPUT
          echo "public-dist-id=$PUBLIC_DIST_ID" >> $GITHUB_OUTPUT
          echo "public-dist-domain=$PUBLIC_DIST_DOMAIN" >> $GITHUB_OUTPUT
          echo "api-endpoint=$API_ENDPOINT" >> $GITHUB_OUTPUT
          echo "user-pool-id=$USER_POOL_ID" >> $GITHUB_OUTPUT

          echo "Public Bucket: $PUBLIC_BUCKET"
          echo "Public CloudFront Domain: $PUBLIC_DIST_DOMAIN"
          echo "API Endpoint: $API_ENDPOINT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActions-DeployPublicFrontend-${{ steps.env.outputs.stage }}

      - name: Install Public Site dependencies
        working-directory: frontend/public
        run: bun install --frozen-lockfile

      - name: Build Public Site
        working-directory: frontend/public
        run: bun run build
        env:
          VITE_API_ENDPOINT: ${{ steps.outputs.outputs.api-endpoint }}
          VITE_COGNITO_USER_POOL_ID: ${{ steps.outputs.outputs.user-pool-id }}

      - name: Deploy Public Site to S3
        run: |
          echo "========================================="
          echo "Deploying Public Site to S3"
          echo "========================================="
          aws s3 sync frontend/public/dist/ s3://${{ steps.outputs.outputs.public-bucket }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "*.map"
          aws s3 cp frontend/public/dist/index.html s3://${{ steps.outputs.outputs.public-bucket }}/ \
            --cache-control "public,max-age=0,must-revalidate"
          echo "✓ Public Site deployed to S3"

      - name: Invalidate Public Site CloudFront Cache
        run: |
          echo "Invalidating CloudFront cache for Public Site..."
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.outputs.outputs.public-dist-id }} \
            --paths "/*"
          echo "✓ CloudFront cache invalidated"

      - name: Public Site Deployment Summary
        if: success()
        run: |
          echo "========================================="
          echo "✓ Public Site Deployment to ${{ steps.env.outputs.env_name }} Complete!"
          echo "========================================="
          echo ""
          echo "Environment: ${{ steps.env.outputs.stage }}"
          echo "Git Branch: ${{ github.ref_name }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo ""
          echo "✓ Public Site deployed and cache invalidated"
          echo "  URL: https://${{ steps.outputs.outputs.public-dist-domain }}"
          echo ""
          if [ "${{ steps.env.outputs.stage }}" == "prd" ]; then
            echo "⚠️  PRODUCTION PUBLIC SITE DEPLOYMENT SUCCESSFUL"
          fi

  # =======================================
  # Deploy Admin Site Frontend Job
  # =======================================
  deploy-admin-frontend:
    name: Deploy Admin Site to ${{ github.ref == 'refs/heads/main' && 'Production' || 'Development' }}
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set environment stage
        id: env
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "stage=prd" >> $GITHUB_OUTPUT
            echo "env_name=Production" >> $GITHUB_OUTPUT
          else
            echo "stage=dev" >> $GITHUB_OUTPUT
            echo "env_name=Development" >> $GITHUB_OUTPUT
          fi

      - name: Download CDK Outputs
        uses: actions/download-artifact@v4
        with:
          name: cdk-outputs
          path: ./

      - name: Extract Stack Outputs
        id: outputs
        run: |
          ADMIN_BUCKET=$(jq -r '.ServerlessBlogStorageStack.AdminSiteBucketName' cdk-outputs.json)
          ADMIN_DIST_ID=$(jq -r '.ServerlessBlogCdnStack.AdminSiteDistributionId' cdk-outputs.json)
          ADMIN_DIST_DOMAIN=$(jq -r '.ServerlessBlogCdnStack.AdminSiteDistributionDomainName' cdk-outputs.json)
          API_ENDPOINT=$(jq -r '.ServerlessBlogApiStack.ApiEndpoint' cdk-outputs.json)
          USER_POOL_ID=$(jq -r '.ServerlessBlogAuthStack.UserPoolId' cdk-outputs.json)
          USER_POOL_CLIENT_ID=$(jq -r '.ServerlessBlogAuthStack.UserPoolClientId' cdk-outputs.json)

          echo "admin-bucket=$ADMIN_BUCKET" >> $GITHUB_OUTPUT
          echo "admin-dist-id=$ADMIN_DIST_ID" >> $GITHUB_OUTPUT
          echo "admin-dist-domain=$ADMIN_DIST_DOMAIN" >> $GITHUB_OUTPUT
          echo "api-endpoint=$API_ENDPOINT" >> $GITHUB_OUTPUT
          echo "user-pool-id=$USER_POOL_ID" >> $GITHUB_OUTPUT
          echo "user-pool-client-id=$USER_POOL_CLIENT_ID" >> $GITHUB_OUTPUT

          echo "Admin Bucket: $ADMIN_BUCKET"
          echo "Admin CloudFront Domain: $ADMIN_DIST_DOMAIN"
          echo "API Endpoint: $API_ENDPOINT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActions-DeployAdminFrontend-${{ steps.env.outputs.stage }}

      - name: Install Admin Site dependencies
        working-directory: frontend/admin
        run: bun install --frozen-lockfile

      - name: Build Admin Site
        working-directory: frontend/admin
        run: bun run build
        env:
          VITE_API_URL: ${{ steps.outputs.outputs.api-endpoint }}
          VITE_COGNITO_USER_POOL_ID: ${{ steps.outputs.outputs.user-pool-id }}
          VITE_COGNITO_USER_POOL_CLIENT_ID: ${{ steps.outputs.outputs.user-pool-client-id }}

      - name: Deploy Admin Site to S3
        run: |
          echo "========================================="
          echo "Deploying Admin Site to S3"
          echo "========================================="
          aws s3 sync frontend/admin/dist/ s3://${{ steps.outputs.outputs.admin-bucket }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "*.map"
          aws s3 cp frontend/admin/dist/index.html s3://${{ steps.outputs.outputs.admin-bucket }}/ \
            --cache-control "public,max-age=0,must-revalidate"
          echo "✓ Admin Site deployed to S3"

      - name: Invalidate Admin Site CloudFront Cache
        run: |
          echo "Invalidating CloudFront cache for Admin Site..."
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.outputs.outputs.admin-dist-id }} \
            --paths "/*"
          echo "✓ CloudFront cache invalidated"

      - name: Admin Site Deployment Summary
        if: success()
        run: |
          echo "========================================="
          echo "✓ Admin Site Deployment to ${{ steps.env.outputs.env_name }} Complete!"
          echo "========================================="
          echo ""
          echo "Environment: ${{ steps.env.outputs.stage }}"
          echo "Git Branch: ${{ github.ref_name }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo ""
          echo "✓ Admin Site deployed and cache invalidated"
