# AWS CDK Deployment Workflow (PR-based)
# Requirement R31: GitHub Actions CI/CD デプロイワークフロー
# Requirement R45: 継続的テスト実行（デプロイ前のテスト実行確認）
#
# このワークフローはAWS CDKとフロントエンドをデプロイします
# - develop ブランチ → dev環境へ自動デプロイ
# - main ブランチ → prd環境へ手動承認後デプロイ
#
# PRベースのワークフロー:
# - PRでCI実行（ci.yml）
# - developまたはmainへのマージ後にデプロイ実行（このワークフロー）
#
# DRY原則に基づき、単一のdeployジョブで全環境に対応
# 各ブランチのEnvironment Secretsに AWS_ROLE_ARN を設定

name: Deploy to AWS

on:
  push:
    branches:
      - develop
      - main

# AWS OIDC認証のための権限設定
permissions:
  id-token: write  # OIDCトークン取得に必要
  contents: read   # リポジトリの読み取りに必要

jobs:
  # =======================================
  # Deploy Infrastructure Job
  # =======================================
  deploy-infrastructure:
    name: Deploy Infrastructure to ${{ github.ref == 'refs/heads/main' && 'Production' || 'Development' }}
    runs-on: ubuntu-latest
    environment:
      # ブランチ名から環境名を動的に決定: develop → dev, main → prod
      name: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
      # CloudFront URLはデプロイ後のサマリーで表示されます

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set environment stage
        id: env
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "stage=prd" >> $GITHUB_OUTPUT
            echo "env_name=Production" >> $GITHUB_OUTPUT
          else
            echo "stage=dev" >> $GITHUB_OUTPUT
            echo "env_name=Development" >> $GITHUB_OUTPUT
          fi

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install infrastructure dependencies
        working-directory: infrastructure
        run: bun install --frozen-lockfile

      - name: Install Lambda Layer dependencies (Common)
        working-directory: layers/common/nodejs
        run: bun install --frozen-lockfile

      - name: Install Lambda Layer dependencies (Powertools)
        working-directory: layers/powertools/nodejs
        run: bun install --frozen-lockfile

      # =======================================
      # Rust Lambda Build Setup
      # =======================================
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92"
          targets: aarch64-unknown-linux-gnu

      - name: Install Cargo Lambda
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-lambda

      - name: Install Zig (cross-compilation for ARM64)
        uses: mlugg/setup-zig@v1
        with:
          version: 0.14.0

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-functions
          cache-on-failure: true

      # =======================================
      # Rust Lambda Pre-build (individual builds for correct output structure)
      # =======================================
      - name: Build all Rust Lambdas
        working-directory: rust-functions
        run: |
          echo "Building all Rust Lambda functions..."
          # Build each Lambda individually to ensure correct output structure
          # Each package creates target/lambda/<package-name>/bootstrap
          PACKAGES=(
            "create_post"
            "get_post"
            "get_public_post"
            "list_posts"
            "update_post"
            "delete_post"
            "get_upload_url"
            "delete_image"
            "login"
            "logout"
            "refresh"
          )
          for pkg in "${PACKAGES[@]}"; do
            echo "Building $pkg..."
            cargo lambda build --profile release-fast --arm64 --package "$pkg"
          done
          echo "✓ All Rust Lambdas built"
          ls -la target/lambda/

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # 各環境のEnvironment SecretからAWS_ROLE_ARNを取得
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActions-Deploy-${{ steps.env.outputs.stage }}

      - name: Get AWS Account ID
        id: aws-account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "::add-mask::$ACCOUNT_ID"
          echo "account-id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "AWS Account ID: ***"

      - name: Get Basic Auth Credentials from Parameter Store (DEV only)
        id: basic-auth
        if: steps.env.outputs.stage == 'dev'
        run: |
          echo "Retrieving Basic Auth credentials from Parameter Store..."
          USERNAME=$(aws ssm get-parameter --name "/serverless-blog/dev/basic-auth/username" --region ap-northeast-1 --query "Parameter.Value" --output text)
          PASSWORD=$(aws ssm get-parameter --name "/serverless-blog/dev/basic-auth/password" --with-decryption --region ap-northeast-1 --query "Parameter.Value" --output text)

          # Mask sensitive values in logs
          echo "::add-mask::$USERNAME"
          echo "::add-mask::$PASSWORD"

          # Export as outputs
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
          echo "✓ Basic Auth credentials retrieved successfully"

      - name: CDK Bootstrap (if needed)
        working-directory: infrastructure
        env:
          # DEV環境Basic認証用の環境変数（Parameter Storeから取得）
          BASIC_AUTH_USERNAME: ${{ steps.basic-auth.outputs.username }}
          BASIC_AUTH_PASSWORD: ${{ steps.basic-auth.outputs.password }}
        run: |
          echo "========================================="
          echo "CDK Bootstrap Check"
          echo "========================================="
          echo "Account ID: ${{ steps.aws-account.outputs.account-id }}"
          echo "Region: ${{ vars.AWS_REGION }}"
          echo ""

          # Bootstrap実行
          if bunx cdk bootstrap aws://${{ steps.aws-account.outputs.account-id }}/${{ vars.AWS_REGION }}; then
            echo "✓ CDK Bootstrap successful"
          else
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 0 ]; then
              echo "✓ Environment already bootstrapped"
            else
              echo "✗ CDK Bootstrap failed with exit code: $EXIT_CODE"
              exit $EXIT_CODE
            fi
          fi

      - name: CDK Deploy
        working-directory: infrastructure
        env:
          # DEV環境Basic認証用の環境変数（Parameter Storeから取得）
          BASIC_AUTH_USERNAME: ${{ steps.basic-auth.outputs.username }}
          BASIC_AUTH_PASSWORD: ${{ steps.basic-auth.outputs.password }}
        run: |
          echo "========================================="
          echo "CDK Deploy - ${{ steps.env.outputs.env_name }} Environment"
          echo "========================================="
          if [ "${{ steps.env.outputs.stage }}" == "prd" ]; then
            echo "⚠️  Deploying to PRODUCTION"
            echo ""
          fi
          bunx cdk deploy --all --require-approval never --context stage=${{ steps.env.outputs.stage }} --context rustTrafficPercent=100 --ci --outputs-file cdk-outputs.json
          echo "✓ CDK Deployment completed successfully"

      - name: Upload CDK Outputs
        uses: actions/upload-artifact@v4
        with:
          name: cdk-outputs
          path: infrastructure/cdk-outputs.json
          retention-days: 1

      - name: Deployment Summary
        if: success()
        working-directory: infrastructure
        run: |
          echo "========================================="
          echo "✓ Infrastructure Deployment to ${{ steps.env.outputs.env_name }} Environment Complete!"
          echo "========================================="
          echo ""
          echo "Environment: ${{ steps.env.outputs.stage }}"
          echo "Region: ${{ vars.AWS_REGION }}"
          echo "Git Branch: ${{ github.ref_name }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo ""
          echo "CloudFront URLs:"
          echo "  Public Site:  https://$(jq -r '.ServerlessBlogCdnStack.PublicSiteDistributionDomainName' cdk-outputs.json)"
          echo "  Admin Site:   https://$(jq -r '.ServerlessBlogCdnStack.AdminSiteDistributionDomainName' cdk-outputs.json)"
          echo "  Image CDN:    https://$(jq -r '.ServerlessBlogCdnStack.ImageDistributionDomainName' cdk-outputs.json)"
          echo ""
          if [ "${{ steps.env.outputs.stage }}" == "prd" ]; then
            echo "⚠️  PRODUCTION DEPLOYMENT SUCCESSFUL"
          fi

  # =======================================
  # Deploy Public Site Frontend Job
  # =======================================
  deploy-public-frontend:
    name: Deploy Public Site to ${{ github.ref == 'refs/heads/main' && 'Production' || 'Development' }}
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set environment stage
        id: env
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "stage=prd" >> $GITHUB_OUTPUT
            echo "env_name=Production" >> $GITHUB_OUTPUT
          else
            echo "stage=dev" >> $GITHUB_OUTPUT
            echo "env_name=Development" >> $GITHUB_OUTPUT
          fi

      - name: Download CDK Outputs
        uses: actions/download-artifact@v4
        with:
          name: cdk-outputs
          path: ./

      - name: Extract Stack Outputs
        id: outputs
        run: |
          # Storage Stack outputs
          PUBLIC_BUCKET=$(jq -r '.ServerlessBlogStorageStack.PublicSiteBucketName' cdk-outputs.json)

          # CDN Stack outputs
          PUBLIC_DIST_ID=$(jq -r '.ServerlessBlogCdnStack.PublicSiteDistributionId' cdk-outputs.json)
          PUBLIC_DIST_DOMAIN=$(jq -r '.ServerlessBlogCdnStack.PublicSiteDistributionDomainName' cdk-outputs.json)

          # API Stack outputs
          API_ENDPOINT=$(jq -r '.ServerlessBlogApiStack.ApiEndpoint' cdk-outputs.json)

          # Auth Stack outputs
          USER_POOL_ID=$(jq -r '.ServerlessBlogAuthStack.UserPoolId' cdk-outputs.json)

          echo "public-bucket=$PUBLIC_BUCKET" >> $GITHUB_OUTPUT
          echo "public-dist-id=$PUBLIC_DIST_ID" >> $GITHUB_OUTPUT
          echo "public-dist-domain=$PUBLIC_DIST_DOMAIN" >> $GITHUB_OUTPUT
          echo "api-endpoint=$API_ENDPOINT" >> $GITHUB_OUTPUT
          echo "user-pool-id=$USER_POOL_ID" >> $GITHUB_OUTPUT

          echo "Public Bucket: $PUBLIC_BUCKET"
          echo "Public CloudFront Domain: $PUBLIC_DIST_DOMAIN"
          echo "API Endpoint: $API_ENDPOINT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActions-DeployPublicFrontend-${{ steps.env.outputs.stage }}

      - name: Install Public Site dependencies
        working-directory: frontend/public
        run: bun install --frozen-lockfile

      - name: Build Public Site
        working-directory: frontend/public
        run: bun run build
        env:
          VITE_API_ENDPOINT: ${{ steps.outputs.outputs.api-endpoint }}
          VITE_COGNITO_USER_POOL_ID: ${{ steps.outputs.outputs.user-pool-id }}

      - name: Deploy Public Site to S3
        run: |
          echo "========================================="
          echo "Deploying Public Site to S3"
          echo "========================================="
          # 静的アセット（JS/CSS/画像）を1年キャッシュ
          aws s3 sync frontend/public/dist/ s3://${{ steps.outputs.outputs.public-bucket }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "*.map"
          # index.htmlは即時更新
          aws s3 cp frontend/public/dist/index.html s3://${{ steps.outputs.outputs.public-bucket }}/ \
            --cache-control "public,max-age=0,must-revalidate"
          echo "✓ Public Site deployed to S3"

      - name: Invalidate Public Site CloudFront Cache
        run: |
          echo "Invalidating CloudFront cache for Public Site..."
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.outputs.outputs.public-dist-id }} \
            --paths "/*"
          echo "✓ CloudFront cache invalidated"

      - name: Public Site Deployment Summary
        if: success()
        run: |
          echo "========================================="
          echo "✓ Public Site Deployment to ${{ steps.env.outputs.env_name }} Complete!"
          echo "========================================="
          echo ""
          echo "Environment: ${{ steps.env.outputs.stage }}"
          echo "Git Branch: ${{ github.ref_name }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo ""
          echo "✓ Public Site deployed and cache invalidated"
          echo "  URL: https://${{ steps.outputs.outputs.public-dist-domain }}"
          echo ""
          if [ "${{ steps.env.outputs.stage }}" == "prd" ]; then
            echo "⚠️  PRODUCTION PUBLIC SITE DEPLOYMENT SUCCESSFUL"
          fi

  # =======================================
  # Deploy Admin Site Frontend Job
  # =======================================
  deploy-admin-frontend:
    name: Deploy Admin Site to ${{ github.ref == 'refs/heads/main' && 'Production' || 'Development' }}
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set environment stage
        id: env
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "stage=prd" >> $GITHUB_OUTPUT
            echo "env_name=Production" >> $GITHUB_OUTPUT
          else
            echo "stage=dev" >> $GITHUB_OUTPUT
            echo "env_name=Development" >> $GITHUB_OUTPUT
          fi

      - name: Download CDK Outputs
        uses: actions/download-artifact@v4
        with:
          name: cdk-outputs
          path: ./

      - name: Extract Stack Outputs
        id: outputs
        run: |
          # Storage Stack outputs
          ADMIN_BUCKET=$(jq -r '.ServerlessBlogStorageStack.AdminSiteBucketName' cdk-outputs.json)

          # CDN Stack outputs
          ADMIN_DIST_ID=$(jq -r '.ServerlessBlogCdnStack.AdminSiteDistributionId' cdk-outputs.json)
          ADMIN_DIST_DOMAIN=$(jq -r '.ServerlessBlogCdnStack.AdminSiteDistributionDomainName' cdk-outputs.json)

          # API Stack outputs
          API_ENDPOINT=$(jq -r '.ServerlessBlogApiStack.ApiEndpoint' cdk-outputs.json)

          # Auth Stack outputs
          USER_POOL_ID=$(jq -r '.ServerlessBlogAuthStack.UserPoolId' cdk-outputs.json)
          USER_POOL_CLIENT_ID=$(jq -r '.ServerlessBlogAuthStack.UserPoolClientId' cdk-outputs.json)

          echo "admin-bucket=$ADMIN_BUCKET" >> $GITHUB_OUTPUT
          echo "admin-dist-id=$ADMIN_DIST_ID" >> $GITHUB_OUTPUT
          echo "admin-dist-domain=$ADMIN_DIST_DOMAIN" >> $GITHUB_OUTPUT
          echo "api-endpoint=$API_ENDPOINT" >> $GITHUB_OUTPUT
          echo "user-pool-id=$USER_POOL_ID" >> $GITHUB_OUTPUT
          echo "user-pool-client-id=$USER_POOL_CLIENT_ID" >> $GITHUB_OUTPUT

          echo "Admin Bucket: $ADMIN_BUCKET"
          echo "Admin CloudFront Domain: $ADMIN_DIST_DOMAIN"
          echo "API Endpoint: $API_ENDPOINT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActions-DeployAdminFrontend-${{ steps.env.outputs.stage }}

      - name: Install Admin Site dependencies
        working-directory: frontend/admin
        run: bun install --frozen-lockfile

      - name: Build Admin Site
        working-directory: frontend/admin
        run: bun run build
        env:
          VITE_API_URL: ${{ steps.outputs.outputs.api-endpoint }}
          VITE_COGNITO_USER_POOL_ID: ${{ steps.outputs.outputs.user-pool-id }}
          VITE_COGNITO_USER_POOL_CLIENT_ID: ${{ steps.outputs.outputs.user-pool-client-id }}

      - name: Deploy Admin Site to S3
        run: |
          echo "========================================="
          echo "Deploying Admin Site to S3"
          echo "========================================="
          # 静的アセット（JS/CSS/画像）を1年キャッシュ
          aws s3 sync frontend/admin/dist/ s3://${{ steps.outputs.outputs.admin-bucket }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "*.map"
          # index.htmlは即時更新
          aws s3 cp frontend/admin/dist/index.html s3://${{ steps.outputs.outputs.admin-bucket }}/ \
            --cache-control "public,max-age=0,must-revalidate"
          echo "✓ Admin Site deployed to S3"

      - name: Invalidate Admin Site CloudFront Cache
        run: |
          echo "Invalidating CloudFront cache for Admin Site..."
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.outputs.outputs.admin-dist-id }} \
            --paths "/*"
          echo "✓ CloudFront cache invalidated"

      - name: Admin Site Deployment Summary
        if: success()
        run: |
          echo "========================================="
          echo "✓ Admin Site Deployment to ${{ steps.env.outputs.env_name }} Complete!"
          echo "========================================="
          echo ""
          echo "Environment: ${{ steps.env.outputs.stage }}"
          echo "Git Branch: ${{ github.ref_name }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo ""
          echo "✓ Admin Site deployed and cache invalidated"
          echo "  URL: https://${{ steps.outputs.outputs.admin-dist-domain }}"
          echo ""
          if [ "${{ steps.env.outputs.stage }}" == "prd" ]; then
            echo "⚠️  PRODUCTION ADMIN SITE DEPLOYMENT SUCCESSFUL"
          fi
