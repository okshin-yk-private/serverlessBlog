name: 'Setup Bun + Dependencies'
description: 'Setup Bun runtime and install frontend dependencies with caching'
inputs:
  bun-version:
    description: 'Bun version to install'
    default: '1.2.0'
  working-directory:
    description: 'Directory containing package.json'
    default: 'frontend'
runs:
  using: 'composite'
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
      with:
        bun-version: ${{ inputs.bun-version }}
    - name: Cache Bun dependencies
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: |
          ${{ inputs.working-directory }}/node_modules
          ~/.bun/install/cache
        key: bun-deps-${{ runner.os }}-${{ hashFiles(format('{0}/bun.lockb', inputs.working-directory)) }}
        restore-keys: |
          bun-deps-${{ runner.os }}-
    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      # Dependabot only updates package.json (the npm ecosystem doesn't touch
      # bun.lock), so --frozen-lockfile would always fail on its PRs. The
      # dependabot-bun-lockfile workflow regenerates and pushes bun.lock back
      # to the PR; here we just need to let the install succeed so the rest
      # of CI (lint/test/build) can run.
      run: |
        if [[ "${GITHUB_ACTOR}" == "dependabot[bot]" ]]; then
          echo "Dependabot PR: running bun install without --frozen-lockfile"
          bun install --no-summary
        else
          bun install --frozen-lockfile
        fi
